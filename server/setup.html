<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>إعداد المباراة</title>
<style>
body{font-family:Tahoma;direction:rtl;background:#f5f5f5;padding:30px;}
.box{background:white;padding:30px;border-radius:20px;max-width:500px;margin:auto;}
input{width:100%;padding:12px;margin:10px 0;border-radius:10px;border:1px solid #ccc;}
button{width:100%;padding:15px;background:#b30000;color:white;border:none;border-radius:12px;font-size:18px;cursor:pointer;}
</style>
</head>
<body>

<script>
if(!localStorage.getItem("userEmail")){
  window.location.href="login.html";
}
</script>

<div class="box">
<h2>إعداد المباراة</h2>

<input id="team1" placeholder="اسم الفريق الأول">
<input id="team2" placeholder="اسم الفريق الثاني">

<button onclick="startGame()">ابدأ المباراة</button>
</div>

<script>
function startGame(){
const t1 = document.getElementById("team1").value.trim();
const t2 = document.getElementById("team2").value.trim();

if(!t1 || !t2){
alert("اكتب أسماء الفرق");
return;
}

localStorage.setItem("team1", t1);
localStorage.setItem("team2", t2);

window.location.href="game.html";
}
</script>

</body>
</html>
