<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>الإجابة</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">

<style>
body{
margin:0;
font-family:'Cairo',sans-serif;
direction:rtl;
background:#f4f4f4;
}

.topbar{
background:linear-gradient(to right,#ff3b3b,#ff7a3d);
color:white;
padding:15px 25px;
display:flex;
justify-content:space-between;
align-items:center;
}

.turn{
background:#b30000;
padding:8px 18px;
border-radius:25px;
font-weight:bold;
}

.end-btn{
background:black;
color:white;
padding:8px 18px;
border-radius:25px;
cursor:pointer;
font-size:14px;
}

.wrapper{
padding:40px;
display:flex;
justify-content:center;
}

.card{
background:white;
width:85%;
border:8px solid #ff5c33;
border-radius:35px;
padding:60px 40px;
min-height:520px;
position:relative;
text-align:center;
}

.answer-title{
font-size:38px;
font-weight:900;
margin-bottom:40px;
}

.answer-image{
margin-top:20px;
}

.answer-image img{
max-width:300px;
border-radius:20px;
}

.buttons{
position:absolute;
bottom:25px;
width:100%;
display:flex;
justify-content:space-between;
padding:0 30px;
}

.btn{
border:none;
padding:12px 30px;
border-radius:25px;
color:white;
cursor:pointer;
font-size:18px;
font-weight:bold;
}

.blue{background:#1565c0;}
.red{background:#d32f2f;}
</style>
</head>
<body>

<div class="topbar">
<div class="end-btn" onclick="endGame()">إنهاء اللعبة</div>
<div>سين ميم</div>
<div class="turn" id="turnBox"></div>
</div>

<div class="wrapper">
<div class="card">

<div class="answer-title" id="answerText"></div>

<div class="answer-image" id="answerImageBox" style="display:none;">
<img id="answerImage">
</div>

<div class="buttons">
<button class="btn blue" onclick="goWinner()">أي فريق ؟</button>
<button class="btn red" onclick="goBack()">العودة للسؤال</button>
</div>

</div>
</div>

<script>

const answer = localStorage.getItem("currentAnswer");
const teamTurn = localStorage.getItem("currentTeam");
const answerImage = localStorage.getItem("currentAnswerImage");

/* حماية */
if(!answer){
window.location.href="game.html";
}

document.getElementById("answerText").innerText = answer;
document.getElementById("turnBox").innerText = "دور فريق: " + teamTurn;

/* عرض صورة الإجابة لو موجودة */
if(answerImage){
document.getElementById("answerImageBox").style.display="block";
document.getElementById("answerImage").src = answerImage;
}

function goWinner(){
window.location.href="winner.html";
}

function goBack(){
window.location.href="question.html";
}

function endGame(){
if(confirm("هل تريد إنهاء اللعبة؟")){
localStorage.removeItem("matchStarted");
window.location.href="game.html";
}
}

</script>

</body>
</html>
