<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>الإجابة</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">

<style>
body{
margin:0;
font-family:'Cairo',sans-serif;
direction:rtl;
background:#e6e6e6;
}

/* ===== Top Bar ===== */

.topbar{
background:linear-gradient(to right,#ff2e2e,#ff7a3d);
color:white;
padding:15px 30px;
display:flex;
justify-content:space-between;
align-items:center;
font-weight:bold;
}

.exit-btn{
background:black;
padding:8px 20px;
border-radius:20px;
cursor:pointer;
}

/* ===== Layout ===== */

.container{
display:flex;
padding:30px;
gap:30px;
}

.board-wrapper{
flex:1;
position:relative;
}

.board{
background:white;
border:8px solid #ff3b3b;
border-radius:40px;
padding:80px 40px;
min-height:500px;
position:relative;
text-align:center;
}

/* Points */

.points-box{
position:absolute;
top:20px;
right:20px;
background:black;
color:white;
padding:8px 20px;
border-radius:20px;
}

/* VAR */

.var-box{
position:absolute;
top:20px;
left:20px;
background:#cfcfcf;
color:black;
padding:6px 14px;
border-radius:10px;
font-weight:bold;
}

/* Answer */

.answer-title{
font-size:40px;
font-weight:900;
margin-top:40px;
}

.answer-image{
margin-top:30px;
}

.answer-image img{
max-width:350px;
border-radius:20px;
}

/* Bottom Buttons */

.bottom-buttons{
position:absolute;
bottom:20px;
width:100%;
display:flex;
justify-content:space-between;
padding:0 40px;
}

.btn{
border:none;
padding:12px 30px;
border-radius:25px;
color:white;
cursor:pointer;
font-weight:bold;
font-size:16px;
}

.blue{background:#1565c0;}
.red{background:#d32f2f;}

/* ===== Sidebar ===== */

.sidebar{
width:280px;
}

.team-card{
margin-bottom:30px;
}

.team-name{
background:#b30000;
color:white;
padding:12px;
border-radius:30px;
text-align:center;
font-weight:bold;
}

.team-score{
text-align:center;
font-size:24px;
margin:10px 0;
}

.helpers{
display:flex;
justify-content:center;
gap:12px;
}

.helper{
width:45px;
height:45px;
border-radius:50%;
background:#e0e0e0;
display:flex;
align-items:center;
justify-content:center;
}

.helper.used{
opacity:0.3;
}
</style>
</head>

<body>

<div class="topbar">
<div class="exit-btn" onclick="endGame()">إنهاء اللعبة</div>
<div>سين ميم</div>
<div id="turnBox"></div>
</div>

<div class="container">

<div class="board-wrapper">

<div class="board">

<div class="points-box" id="pointsBox"></div>
<div class="var-box">VAR</div>

<div class="answer-title" id="answerText"></div>

<div class="answer-image" id="answerImageBox" style="display:none;">
<img id="answerImage">
</div>

<div class="bottom-buttons">
<button class="btn blue" onclick="chooseWinner()">أي فريق ؟</button>
<button class="btn red" onclick="goBack()">ارجع للسؤال</button>
</div>

</div>
</div>

<div class="sidebar">

<div class="team-card">
<div class="team-name" id="team1Name"></div>
<div class="team-score" id="score1"></div>
<div class="helpers">
<div class="helper" id="double1">✌</div>
<div class="helper" id="steal1">🕵</div>
<div class="helper" id="hole1">🕳</div>
</div>
</div>

<div class="team-card">
<div class="team-name" id="team2Name"></div>
<div class="team-score" id="score2"></div>
<div class="helpers">
<div class="helper" id="double2">✌</div>
<div class="helper" id="steal2">🕵</div>
<div class="helper" id="hole2">🕳</div>
</div>
</div>

</div>

</div>

<script>

/* ===== Load Data ===== */

const answer = localStorage.getItem("currentAnswer");
const points = parseInt(localStorage.getItem("currentPoints"));
const answerImage = localStorage.getItem("currentAnswerImage");
const teamTurn = parseInt(localStorage.getItem("currentTeam"));

const team1 = localStorage.getItem("team1Name");
const team2 = localStorage.getItem("team2Name");

let score1 = parseInt(localStorage.getItem("score1")) || 0;
let score2 = parseInt(localStorage.getItem("score2")) || 0;

if(!answer){ window.location.href="game.html"; }

document.getElementById("answerText").innerText = answer;
document.getElementById("pointsBox").innerText = points + " نقطة";

if(answerImage && answerImage !== "null"){
document.getElementById("answerImageBox").style.display="block";
document.getElementById("answerImage").src = answerImage;
}

document.getElementById("team1Name").innerText = team1;
document.getElementById("team2Name").innerText = team2;

updateScores();

document.getElementById("turnBox").innerText =
"دور فريق: " + (teamTurn === 1 ? team1 : team2);

/* ===== Disable Used Helpers ===== */

["1","2"].forEach(t=>{
if(localStorage.getItem("doubleUsed"+t)) document.getElementById("double"+t).classList.add("used");
if(localStorage.getItem("stealUsed"+t)) document.getElementById("steal"+t).classList.add("used");
if(localStorage.getItem("holeUsed"+t)) document.getElementById("hole"+t).classList.add("used");
});

/* ===== Choose Winner ===== */

function chooseWinner(){

let winner = prompt("اكتب رقم الفريق الفائز (1 أو 2) أو 0 إذا لا أحد");

if(!["0","1","2"].includes(winner)) return;

winner = parseInt(winner);

handleResult(winner);

finishRound();

}

function handleResult(winner){

let stealActive = localStorage.getItem("stealActive");
let stealTeam = parseInt(localStorage.getItem("stealTeam"));
let holeActive = localStorage.getItem("holeActive");

if(stealActive){

if(winner === stealTeam){

addPoints(stealTeam, points);

}else{

addPoints(teamTurn, points);

subtractPoints(stealTeam, points);

}

}

else{

if(winner === 1 || winner === 2){

addPoints(winner, points);

if(holeActive){

let other = winner === 1 ? 2 : 1;

subtractPoints(other, points);

}

}

}

}

function addPoints(team, pts){

if(team === 1) score1 += pts;
if(team === 2) score2 += pts;

}

function subtractPoints(team, pts){

if(team === 1) score1 -= pts;
if(team === 2) score2 -= pts;

}

function finishRound(){

localStorage.setItem("score1",score1);
localStorage.setItem("score2",score2);

localStorage.removeItem("stealActive");
localStorage.removeItem("stealTeam");
localStorage.removeItem("holeActive");
localStorage.removeItem("doubleActive");

setTimeout(()=>{
window.location.href="game.html";
},500);

}

function updateScores(){

document.getElementById("score1").innerText = score1;
document.getElementById("score2").innerText = score2;

}

function goBack(){
window.location.href="question.html";
}

function endGame(){
localStorage.removeItem("matchStarted");
window.location.href="game.html";
}

</script>

</body>
</html>
