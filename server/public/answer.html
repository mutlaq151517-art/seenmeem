<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>الإجابة</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">

<style>
body{
margin:0;
font-family:'Cairo',sans-serif;
direction:rtl;
background:#e6e6e6;
}

/* ===== Top Bar ===== */

.topbar{
background:linear-gradient(to right,#ff2e2e,#ff7a3d);
color:white;
padding:15px 30px;
display:flex;
justify-content:space-between;
align-items:center;
font-weight:bold;
}

.exit-btn{
background:black;
padding:8px 20px;
border-radius:20px;
cursor:pointer;
}

/* ===== Layout ===== */

.container{
display:flex;
padding:20px;
gap:20px;
max-width:1100px;
margin:auto;
}

.board-wrapper{
flex:1;
position:relative;
}

.board{
background:white;
border:8px solid #ff3b3b;
border-radius:40px;
padding:60px 30px;
min-height:420px;
position:relative;
text-align:center;
}

/* Points */

.points-box{
position:absolute;
top:20px;
right:20px;
background:black;
color:white;
padding:8px 20px;
border-radius:20px;
}

/* VAR */

.var-box{
position:absolute;
top:20px;
left:20px;
background:#cfcfcf;
color:black;
padding:6px 14px;
border-radius:10px;
font-weight:bold;
}

/* Answer */

.answer-title{
font-size:40px;
font-weight:900;
margin-top:40px;
}

.answer-image{
margin-top:30px;
}

.answer-image img{
max-width:350px;
border-radius:20px;
}

/* Bottom Buttons */

.bottom-buttons{
position:absolute;
bottom:20px;
width:100%;
display:flex;
justify-content:space-between;
padding:0 40px;
}

.btn{
border:none;
padding:12px 30px;
border-radius:25px;
color:white;
cursor:pointer;
font-weight:bold;
font-size:16px;
}

.blue{background:#1565c0;}
.red{background:#d32f2f;}

/* ===== Sidebar ===== */

.sidebar{
width:280px;
}

.team-card{
margin-bottom:30px;
}

.team-name{
background:#b30000;
color:white;
padding:12px;
border-radius:30px;
text-align:center;
font-weight:bold;
}

.team-score{
text-align:center;
font-size:24px;
margin:10px 0;
}

.helpers{
display:flex;
justify-content:center;
gap:12px;
}

.helper{
width:45px;
height:45px;
border-radius:50%;
background:#e0e0e0;
display:flex;
align-items:center;
justify-content:center;
}

.helper.used{
opacity:0.3;
}

/* ===== TEAM SELECT PANEL ===== */

.team-select{
position:fixed;
top:0;
left:0;
right:0;
bottom:0;
background:#e6e6e6;
display:none;
justify-content:center;
align-items:center;
flex-direction:column;
z-index:9999;
}

.team-select h2{
font-size:36px;
margin-bottom:40px;
}

.team-btn{
padding:20px 60px;
font-size:22px;
border:none;
border-radius:30px;
background:#b30000;
color:white;
margin:10px;
cursor:pointer;
}

.none-btn{
background:#777;
}

.back-btn{
margin-top:40px;
padding:10px 30px;
background:#2e7d32;
color:white;
border:none;
border-radius:20px;
cursor:pointer;
}

</style>
</head>

<body>

<div class="topbar">
<div class="exit-btn" onclick="endGame()">إنهاء اللعبة</div>
<div>سين ميم</div>
<div id="turnBox"></div>
</div>

<div class="container">

<div class="board-wrapper">

<div class="board">

<div class="points-box" id="pointsBox"></div>
<div class="var-box">VAR</div>

<div class="answer-title" id="answerText"></div>

<div class="answer-image" id="answerImageBox" style="display:none;">
<img id="answerImage">
</div>

<div class="bottom-buttons">
<button class="btn blue" onclick="openTeamSelect()">أي فريق ؟</button>
<button class="btn red" onclick="goBack()">ارجع للسؤال</button>
</div>

</div>
</div>

<div class="sidebar">

<div class="team-card">
<div class="team-name" id="team1Name"></div>
<div class="team-score" id="score1"></div>
<div class="helpers">
<div class="helper" id="double1">✌</div>
<div class="helper" id="steal1">🕵</div>
<div class="helper" id="hole1">🕳</div>
</div>
</div>

<div class="team-card">
<div class="team-name" id="team2Name"></div>
<div class="team-score" id="score2"></div>
<div class="helpers">
<div class="helper" id="double2">✌</div>
<div class="helper" id="steal2">🕵</div>
<div class="helper" id="hole2">🕳</div>
</div>
</div>

</div>

</div>

<!-- TEAM SELECT SCREEN -->

<div class="team-select" id="teamSelect">

<h2>أي فريق جاوب صح ؟</h2>

<button class="team-btn" onclick="selectWinner(1)" id="btnTeam1"></button>
<button class="team-btn" onclick="selectWinner(2)" id="btnTeam2"></button>

<button class="team-btn none-btn" onclick="selectWinner(0)">ولا أحد</button>

<button class="back-btn" onclick="closeTeamSelect()">العودة للإجابة</button>

</div>

<script>

/* ===== Load Data ===== */

const answer = localStorage.getItem("currentAnswer");
const points = parseInt(localStorage.getItem("currentPoints")) || 0;
const answerImage = localStorage.getItem("currentAnswerImage");

const team1 = localStorage.getItem("team1Name") || "فريق 1";
const team2 = localStorage.getItem("team2Name") || "فريق 2";

let score1 = parseInt(localStorage.getItem("score1")) || 0;
let score2 = parseInt(localStorage.getItem("score2")) || 0;

let teamTurn = parseInt(localStorage.getItem("currentTeam"));

if(!teamTurn){
teamTurn = 1;
localStorage.setItem("currentTeam",1);
}

if(!answer){
alert("لا يوجد جواب");
window.location.href="game.html";
}

/* ===== Show Answer ===== */

document.getElementById("answerText").innerText = answer;
document.getElementById("pointsBox").innerText = points + " نقطة";

if(answerImage && answerImage !== "null" && answerImage !== ""){
document.getElementById("answerImageBox").style.display="block";
document.getElementById("answerImage").src = answerImage;
}

/* ===== Teams ===== */

document.getElementById("team1Name").innerText = team1;
document.getElementById("team2Name").innerText = team2;

document.getElementById("btnTeam1").innerText = team1;
document.getElementById("btnTeam2").innerText = team2;

updateScores();

document.getElementById("turnBox").innerText =
"دور فريق: " + (teamTurn === 1 ? team1 : team2);

/* ===== TEAM SELECT ===== */

function openTeamSelect(){
document.getElementById("teamSelect").style.display="flex";
}

function closeTeamSelect(){
document.getElementById("teamSelect").style.display="none";
}

/* ===== Choose Winner ===== */

function selectWinner(winner){

handleResult(winner);

finishRound();

}

function handleResult(winner){

let stealActive = localStorage.getItem("stealActive");
let stealTeam = parseInt(localStorage.getItem("stealTeam"));
let holeActive = localStorage.getItem("holeActive");

if(stealActive){

if(winner === stealTeam){
addPoints(stealTeam, points);
}else{
addPoints(teamTurn, points);
subtractPoints(stealTeam, points);
}

}else{

if(winner === 1 || winner === 2){

addPoints(winner, points);

if(holeActive){
let other = winner === 1 ? 2 : 1;
subtractPoints(other, points);
}

}

}

}

function addPoints(team, pts){
if(team === 1) score1 += pts;
if(team === 2) score2 += pts;
}

function subtractPoints(team, pts){
if(team === 1) score1 -= pts;
if(team === 2) score2 -= pts;
}

function finishRound(){

localStorage.setItem("score1",score1);
localStorage.setItem("score2",score2);

localStorage.removeItem("stealActive");
localStorage.removeItem("stealTeam");
localStorage.removeItem("holeActive");
localStorage.removeItem("doubleActive");

teamTurn = teamTurn === 1 ? 2 : 1;
localStorage.setItem("currentTeam",teamTurn);

setTimeout(()=>{
window.location.href="game.html";
},500);

}

function updateScores(){
document.getElementById("score1").innerText = score1;
document.getElementById("score2").innerText = score2;
}

function goBack(){
window.location.href="question.html";
}

function endGame(){
localStorage.removeItem("matchStarted");
window.location.href="game.html";
}

</script>

</body>
</html>
