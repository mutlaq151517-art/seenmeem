<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>الإجابة</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">

<style>
body{margin:0;font-family:'Cairo',sans-serif;direction:rtl;background:#f4f4f4;}

.topbar{
background:linear-gradient(to right,#ff3b3b,#ff7a3d);
color:white;
padding:15px 25px;
display:flex;
justify-content:space-between;
align-items:center;
}

.turn{background:#b30000;padding:8px 18px;border-radius:25px;font-weight:bold;}
.end-btn{background:black;color:white;padding:8px 18px;border-radius:25px;cursor:pointer;font-size:14px;}

.main-container{
display:flex;
gap:30px;
padding:40px;
}

.wrapper{flex:1;display:flex;justify-content:center;}

.card{
background:white;
width:100%;
border:8px solid #ff5c33;
border-radius:35px;
padding:60px 40px;
min-height:520px;
position:relative;
text-align:center;
}

.answer-title{
font-size:38px;
font-weight:900;
margin-bottom:40px;
}

.answer-image img{
max-width:300px;
border-radius:20px;
}

.buttons{
position:absolute;
bottom:25px;
width:100%;
display:flex;
justify-content:space-between;
padding:0 30px;
}

.btn{
border:none;
padding:12px 30px;
border-radius:25px;
color:white;
cursor:pointer;
font-size:18px;
font-weight:bold;
}

.blue{background:#1565c0;}
.red{background:#d32f2f;}

/* ===== Sidebar ===== */

.sidebar{
width:280px;
}

.team-box{
background:#b30000;
color:white;
padding:15px;
border-radius:25px;
text-align:center;
font-weight:bold;
margin-bottom:10px;
}

.score{
text-align:center;
font-size:24px;
margin-bottom:20px;
}

.helpers{
display:flex;
justify-content:center;
gap:10px;
margin-bottom:30px;
}

.helper{
width:45px;
height:45px;
border-radius:50%;
background:#e0e0e0;
display:flex;
align-items:center;
justify-content:center;
}

.helper.used{
opacity:0.3;
}
</style>
</head>
<body>

<div class="topbar">
<div class="end-btn" onclick="endGame()">إنهاء اللعبة</div>
<div>سين ميم</div>
<div class="turn" id="turnBox"></div>
</div>

<div class="main-container">

<div class="wrapper">
<div class="card">

<div class="answer-title" id="answerText"></div>

<div class="answer-image" id="answerImageBox" style="display:none;">
<img id="answerImage">
</div>

<div class="buttons">
<button class="btn blue" onclick="goWinner()">أي فريق ؟</button>
<button class="btn red" onclick="goBack()">العودة للسؤال</button>
</div>

</div>
</div>

<!-- ===== Sidebar ===== -->

<div class="sidebar">

<div class="team-box" id="team1NameBox"></div>
<div class="score" id="score1Box"></div>
<div class="helpers">
<div class="helper" id="double1">✌</div>
<div class="helper" id="steal1">🕵</div>
<div class="helper" id="hole1">🕳</div>
</div>

<div class="team-box" id="team2NameBox"></div>
<div class="score" id="score2Box"></div>
<div class="helpers">
<div class="helper" id="double2">✌</div>
<div class="helper" id="steal2">🕵</div>
<div class="helper" id="hole2">🕳</div>
</div>

</div>

</div>

<script>

/* ===== بيانات ===== */

const answer = localStorage.getItem("currentAnswer");
const teamTurn = localStorage.getItem("currentTeam");
const answerImage = localStorage.getItem("currentAnswerImage");

const team1 = localStorage.getItem("team1Name");
const team2 = localStorage.getItem("team2Name");

document.getElementById("answerText").innerText = answer;

const teamName = teamTurn === "1" ? team1 : team2;
document.getElementById("turnBox").innerText = "دور فريق: " + teamName;

if(answerImage && answerImage !== "null"){
document.getElementById("answerImageBox").style.display="block";
document.getElementById("answerImage").src = answerImage;
}

/* ===== عرض السكور ===== */

document.getElementById("team1NameBox").innerText = team1;
document.getElementById("team2NameBox").innerText = team2;

document.getElementById("score1Box").innerText = localStorage.getItem("score1") || 0;
document.getElementById("score2Box").innerText = localStorage.getItem("score2") || 0;

/* ===== تعطيل الوسائل المستخدمة ===== */

if(localStorage.getItem("doubleUsed1")) document.getElementById("double1").classList.add("used");
if(localStorage.getItem("stealUsed1")) document.getElementById("steal1").classList.add("used");
if(localStorage.getItem("holeUsed1")) document.getElementById("hole1").classList.add("used");

if(localStorage.getItem("doubleUsed2")) document.getElementById("double2").classList.add("used");
if(localStorage.getItem("stealUsed2")) document.getElementById("steal2").classList.add("used");
if(localStorage.getItem("holeUsed2")) document.getElementById("hole2").classList.add("used");

/* ===== أزرار ===== */

function goWinner(){
window.location.href="winner.html";
}

function goBack(){
window.location.href="question.html";
}

function endGame(){
if(confirm("هل تريد إنهاء اللعبة؟")){
localStorage.removeItem("matchStarted");
window.location.href="game.html";
}
}

</script>

</body>
</html>
