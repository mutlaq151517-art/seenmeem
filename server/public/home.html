<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>سين ميم</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">

<style>
body{margin:0;font-family:'Cairo',sans-serif;direction:rtl;background:#fff;}
.navbar{background:#f3f3f3;display:flex;justify-content:space-between;align-items:center;padding:15px 40px;font-weight:bold;}
.logo{font-size:28px;color:#e33b2e;font-weight:900;}
.hero{height:85vh;background:linear-gradient(135deg,#ff3b3b,#ff7a3d,#ffb347);display:flex;flex-direction:column;justify-content:center;align-items:center;text-align:center;color:white;}
.hero h1{font-size:70px;margin:0;font-weight:900;}
.hero p{font-size:22px;margin:20px 0;}
.btn{padding:15px 30px;border:none;border-radius:15px;font-size:18px;cursor:pointer;font-weight:bold;}
.red{background:#b30000;color:white;}
.white{background:white;color:#b30000;}
</style>
</head>
<body>

<script>
// يمنع الدخول إذا مو مسجل
if(!localStorage.getItem("userEmail")){
  window.location.href = "login.html";
}
</script>

<div class="navbar">
<div class="logo">سين ميم</div>
</div>

<div class="hero">
<h1>سين ميم</h1>
<p>الجواب عليك، والسؤال علينا</p>

<div style="margin-top:30px;display:flex;gap:20px;">
<button class="btn red" onclick="location.href='setup.html'">إنشاء لعبة</button>
<button class="btn white" onclick="logout()">تسجيل خروج</button>
</div>

</div>

<script>
function logout(){
localStorage.clear();
window.location.href="login.html";
}
</script>

</body>
</html>
