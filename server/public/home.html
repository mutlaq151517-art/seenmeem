<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>SeenMeem - الرئيسية</title>
<style>
body{
  margin:0;
  font-family:Tahoma;
  direction:rtl;
  background:#f4f4f4;
}

.container{
  width:90%;
  max-width:500px;
  margin:120px auto;
  text-align:center;
}

h2{
  margin-bottom:40px;
}

button{
  width:100%;
  padding:18px;
  margin-bottom:20px;
  border:none;
  border-radius:15px;
  background:linear-gradient(to right,#ff3b3b,#ff9c52);
  color:white;
  font-size:20px;
  cursor:pointer;
}

.logout{
  background:#444;
}
</style>
</head>
<body>

<div class="container">
  <h2>مرحباً <span id="username"></span> 👋</h2>

  <button onclick="startGame()">ابدأ اللعب</button>

  <button class="logout" onclick="logout()">تسجيل خروج</button>
</div>

<script>

const name = localStorage.getItem("userName");
if(!name){
  window.location.href="login.html";
}
document.getElementById("username").innerText = name;

function startGame(){
  window.location.href="select.html"; // 👈 هنا التعديل
}

function logout(){
  localStorage.clear();
  window.location.href="login.html";
}

</script>

</body>
</html>
