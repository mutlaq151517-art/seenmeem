<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>SeenMeem</title>

<style>
body{
margin:0;
font-family:Tahoma;
direction:rtl;
background:#ffffff;
}

/* ===== Top Bar ===== */
.top{
display:flex;
justify-content:space-between;
align-items:center;
padding:15px 30px;
background:#f2f2f2;
font-weight:bold;
}

/* ===== Hero Section ===== */
.hero{
height:85vh;
background:linear-gradient(to right,#ff3b3b,#ff9c52);
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
color:white;
text-align:center;
}

.hero h1{
font-size:60px;
margin:0;
}

.hero p{
font-size:22px;
margin-top:20px;
}

.start-btn{
margin-top:35px;
padding:15px 40px;
background:white;
color:#ff3b3b;
border:none;
border-radius:30px;
font-size:20px;
cursor:pointer;
font-weight:bold;
}

.start-btn:hover{
opacity:0.9;
}
</style>
</head>
<body>

<div class="top">
<div id="welcome"></div>
<div>SeenMeem</div>
</div>

<div class="hero">
<h1>سين جيم</h1>
<p>الجواب عليك ، والسؤال علينا</p>
<button class="start-btn" onclick="startGame()">ابدأ اللعب</button>
</div>

<script>
const name = localStorage.getItem("userName");

if(!name){
window.location.href="login.html";
}

document.getElementById("welcome").innerText = "مرحباً " + name + " 👋";

function startGame(){
window.location.href="game.html";
}
</script>

</body>
</html>
