<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>سين ميم</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">

<style>
body{margin:0;font-family:'Cairo',sans-serif;direction:rtl;background:#fff;}

.navbar{
background:#f3f3f3;
display:flex;
justify-content:space-between;
align-items:center;
padding:15px 40px;
font-weight:bold;
}

.logo{
font-size:28px;
color:#e33b2e;
font-weight:900;
}

.user-info{
display:flex;
gap:20px;
align-items:center;
}

.balance-box{
background:#b30000;
color:white;
padding:8px 18px;
border-radius:20px;
font-size:14px;
}

.level-box{
background:#ff7a3d;
color:white;
padding:8px 18px;
border-radius:20px;
font-size:14px;
}

.hero{
height:85vh;
background:#0b2340;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
color:white;
}

.hero h1{
font-size:70px;
margin:0;
font-weight:900;
}

.hero p{
font-size:22px;
margin:20px 0;
}

.btn{
padding:15px 30px;
border:none;
border-radius:15px;
font-size:18px;
cursor:pointer;
font-weight:bold;
}

.red{background:#b30000;color:white;}
.white{background:white;color:#b30000;}

.disabled{
opacity:0.5;
pointer-events:none;
}
</style>
</head>
<body>

<script>
if(!localStorage.getItem("userEmail")){
  window.location.href = "login.html";
}
</script>

<div class="navbar">
<div class="logo">سين ميم</div>

<div class="user-info">
<div class="balance-box" id="balanceBox"></div>
<div class="level-box" id="levelBox"></div>
</div>
</div>

<div class="hero">
<h1>سين ميم</h1>
<p>الجواب عليك، والسؤال علينا</p>

<div style="margin-top:30px;display:flex;gap:20px;">
<button class="btn red" id="startBtn" onclick="startGame()">إنشاء لعبة</button>
<button class="btn white" onclick="logout()">تسجيل خروج</button>
</div>

</div>

<script>

const email = localStorage.getItem("userEmail");

let balance = 0;
let level = 1;

const balanceBox = document.getElementById("balanceBox");
const levelBox = document.getElementById("levelBox");
const startBtn = document.getElementById("startBtn");

/* ===== جلب البيانات الحقيقية من السيرفر ===== */

async function loadUserData(){

const res = await fetch("/api/login-data",{
method:"POST",
headers:{ "Content-Type":"application/json" },
body: JSON.stringify({ email })
});

if(res.ok){
const data = await res.json();
balance = data.games_balance;
level = data.level;

localStorage.setItem("games_balance",balance);
localStorage.setItem("level",level);
}

updateUI();
}

function updateUI(){

balanceBox.innerText = "رصيد الألعاب: " + balance;
levelBox.innerText = "المستوى: " + level;

if(balance <= 0){
startBtn.classList.add("disabled");
startBtn.innerText = "لا يوجد رصيد";
}else{
startBtn.classList.remove("disabled");
startBtn.innerText = "إنشاء لعبة";
}
}

async function startGame(){
localStorage.removeItem("usedQuestions");
if(balance <= 0){
alert("لا يوجد لديك رصيد ألعاب");
return;
}

const res = await fetch("/api/start-match",{
method:"POST",
headers:{ "Content-Type":"application/json" },
body: JSON.stringify({ email })
});

const data = await res.json();

if(!res.ok){
alert(data.message || "خطأ في بدء المباراة");
return;
}

balance = data.games_balance;
level = data.level;

localStorage.setItem("games_balance",balance);
localStorage.setItem("level",level);

updateUI();
for(let key in localStorage){
if(key.startsWith("used_")){
localStorage.removeItem(key);
}
}
window.location.href="setup.html";
}

function logout(){
localStorage.clear();
window.location.href="login.html";
}

loadUserData();

</script>

</body>
</html>
