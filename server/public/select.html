<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>اختر 6 فئات</title>
<style>
body{margin:0;font-family:Cairo;direction:rtl;background:#f3f3f3;}
h2{text-align:center;margin:40px 0;font-size:32px;}

.container{
width:95%;
max-width:1200px;
margin:auto;
display:grid;
grid-template-columns:repeat(auto-fill,minmax(250px,1fr));
gap:25px;
}

.card{
background:#eee;
border-radius:25px;
padding:20px;
text-align:center;
cursor:pointer;
transition:.3s;
}

.card img{
width:120px;
height:120px;
object-fit:contain;
margin-bottom:15px;
}

.card-title{
background:#ff7a3d;
color:white;
padding:10px;
border-radius:15px;
font-weight:bold;
}

.card.selected{
outline:4px solid #ff3b3b;
}

.start-btn{
margin:50px auto;
display:block;
width:300px;
padding:15px;
border:none;
border-radius:15px;
background:linear-gradient(to right,#ff3b3b,#ff9c52);
color:white;
font-size:20px;
cursor:pointer;
display:none;
}
</style>
</head>
<body>

<h2>اختر 6 فئات</h2>

<div class="container" id="categories"></div>
<button class="start-btn" id="startBtn" onclick="goNext()">التالي</button>

<script>
let selected=[];
const container=document.getElementById("categories");

fetch("/api/categories")
.then(res=>res.json())
.then(data=>{
data.forEach(cat=>{
const div=document.createElement("div");
div.className="card";
div.innerHTML=`
<img src="${cat.image}">
<div class="card-title">${cat.name}</div>
`;
div.onclick=()=>toggle(div,cat.name);
container.appendChild(div);
});
});

function toggle(el,name){
if(selected.includes(name)){
selected=selected.filter(c=>c!==name);
el.classList.remove("selected");
}else{
if(selected.length>=6){alert("اختر 6 فقط");return;}
selected.push(name);
el.classList.add("selected");
}
document.getElementById("startBtn").style.display=
selected.length===6?"block":"none";
}

function goNext(){
localStorage.setItem("selectedCategories",JSON.stringify(selected));
window.location.href="teams.html";
}
</script>
</body>
</html>
