<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>اختيار الفئات</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">

<style>
body{
margin:0;
font-family:'Cairo',sans-serif;
direction:rtl;
background:#f3f3f3;
padding:50px 60px;
}

h2{
text-align:center;
margin-bottom:50px;
font-size:34px;
font-weight:900;
}

/* ===== GRID ===== */

.grid{
display:grid;
grid-template-columns:repeat(2, 1fr);
gap:40px 50px;
max-width:1100px;
margin:auto;
}

/* ===== CARD ===== */

.card{
position:relative;
background:white;
border-radius:35px;
overflow:hidden;
cursor:pointer;
transition:0.25s;
box-shadow:0 8px 20px rgba(0,0,0,0.08);
}

.card.selected{
outline:5px solid #ff7a3d;
}

.card:hover{
transform:translateY(-4px);
}

/* ===== IMAGE ===== */

.card img{
width:100%;
height:240px;   /* الحجم المضبوط */
object-fit:cover;
display:block;
}

/* ===== TITLE ===== */

.card-title{
background:#ff7a3d;
color:white;
text-align:center;
padding:18px;
font-size:24px;
font-weight:bold;
}

/* ===== INFO ICON ===== */

.info{
position:absolute;
top:15px;
left:15px;
width:38px;
height:38px;
background:#2d8cff;
color:white;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
font-weight:bold;
font-size:20px;
}

/* ===== BUTTON ===== */

button{
margin-top:60px;
padding:18px 45px;
border:none;
border-radius:30px;
background:#b30000;
color:white;
font-size:20px;
cursor:pointer;
display:block;
margin-left:auto;
margin-right:auto;
font-weight:bold;
}

button:hover{
background:#8f0000;
}

@media(max-width:900px){
.grid{
grid-template-columns:1fr;
}
}

</style>
</head>

<body>

<script>
if(!localStorage.getItem("userEmail")){
  window.location.href="login.html";
}
</script>

<h2>اختر 6 فئات</h2>

<div class="grid" id="categories"></div>

<button onclick="next()">التالي</button>

<script>

let selected = [];

async function loadCategories(){
try{

const res = await fetch("/api/categories");
if(!res.ok){
alert("مشكلة في جلب الفئات");
return;
}

const data = await res.json();
const container = document.getElementById("categories");
container.innerHTML = "";

data.forEach(cat=>{

const div = document.createElement("div");
div.className="card";

div.innerHTML=`
<div class="info">i</div>
<img src="${cat.image}" onerror="this.src='https://via.placeholder.com/600x400'">
<div class="card-title">${cat.name}</div>
`;

div.onclick=()=>{
if(selected.includes(cat.name)){
selected = selected.filter(c=>c!==cat.name);
div.classList.remove("selected");
}else{
if(selected.length>=6){
alert("تقدر تختار 6 فقط");
return;
}
selected.push(cat.name);
div.classList.add("selected");
}
};

container.appendChild(div);
});

}catch(err){
alert("فشل الاتصال بالسيرفر");
}
}

function next(){
if(selected.length!==6){
alert("لازم تختار 6 فئات");
return;
}

localStorage.setItem("selectedCategories",JSON.stringify(selected));
window.location.href="teams.html";
}

loadCategories();

</script>

</body>
</html>
