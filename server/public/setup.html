<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>اختيار الفئات</title>
<style>
body{
margin:0;
font-family:Cairo;
direction:rtl;
background:#f2f2f2;
padding:30px;
}

h2{
text-align:center;
margin-bottom:30px;
}

.grid{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:20px;
}

.card{
background:white;
padding:20px;
border-radius:15px;
text-align:center;
cursor:pointer;
border:3px solid transparent;
}

.card.selected{
border:3px solid #b30000;
background:#ffe6e6;
}

img{
width:60px;
height:60px;
}

button{
margin-top:30px;
padding:15px 25px;
border:none;
border-radius:12px;
background:#b30000;
color:white;
font-size:18px;
cursor:pointer;
display:block;
margin-left:auto;
margin-right:auto;
}
</style>
</head>
<body>

<h2>اختر 6 فئات</h2>

<div class="grid" id="categories"></div>

<button onclick="next()">التالي</button>

<script>

let selected = [];

async function loadCategories(){
const res = await fetch("/api/categories");
const data = await res.json();

const container = document.getElementById("categories");

data.forEach(cat=>{
const div = document.createElement("div");
div.className="card";
div.innerHTML=`
<img src="${cat.image}">
<h4>${cat.name}</h4>
`;

div.onclick=()=>{
if(selected.includes(cat.name)){
selected = selected.filter(c=>c!==cat.name);
div.classList.remove("selected");
}else{
if(selected.length>=6){
alert("اختر 6 فقط");
return;
}
selected.push(cat.name);
div.classList.add("selected");
}
};

container.appendChild(div);
});
}

function next(){
if(selected.length!==6){
alert("لازم تختار 6 فئات");
return;
}

localStorage.setItem("selectedCategories",JSON.stringify(selected));
window.location.href="teams.html";
}

loadCategories();

</script>

</body>
</html>
