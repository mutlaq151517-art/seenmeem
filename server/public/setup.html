<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>اختيار الفئات</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">

<style>
body{
margin:0;
font-family:'Cairo',sans-serif;
direction:rtl;
background:#f3f3f3;
}

.container{
max-width:1400px;
margin:auto;
padding:60px 40px 120px;
}

h2{
text-align:center;
font-size:34px;
font-weight:900;
margin-bottom:70px;
}

.grid{
display:grid;
grid-template-columns:repeat(4, 1fr);
gap:35px;
}

.card{
position:relative;
background:white;
border-radius:20px;
overflow:hidden;
cursor:pointer;
transition:0.25s;
box-shadow:0 4px 10px rgba(0,0,0,0.08);
}

.card:hover{
transform:translateY(-3px);
}

.card.selected{
box-shadow:0 0 0 4px #ff7a3d;
}

.card.disabled{
filter:grayscale(100%);
opacity:0.5;
pointer-events:none;
}

.card img{
width:100%;
height:150px;
object-fit:cover;
display:block;
}

.card-title{
background:#ff7a3d;
color:white;
text-align:center;
padding:12px;
font-size:18px;
font-weight:bold;
}

.info{
position:absolute;
top:10px;
left:10px;
width:26px;
height:26px;
background:#2d8cff;
color:white;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
font-weight:bold;
font-size:13px;
}

button{
margin:90px auto 0;
display:block;
padding:16px 45px;
background:#b30000;
border:none;
border-radius:28px;
color:white;
font-size:18px;
font-weight:bold;
cursor:pointer;
}

button:hover{
background:#8f0000;
}

/* ===== الشريط الجانبي ===== */

.selected-panel{
position:fixed;
right:20px;
bottom:20px;
background:white;
border-radius:20px;
padding:15px;
box-shadow:0 5px 20px rgba(0,0,0,0.15);
display:flex;
flex-direction:column;
gap:10px;
}

.selected-item{
position:relative;
width:60px;
height:60px;
border-radius:15px;
overflow:hidden;
}

.selected-item img{
width:100%;
height:100%;
object-fit:cover;
}

.remove-btn{
position:absolute;
top:2px;
right:2px;
background:red;
color:white;
border-radius:50%;
width:18px;
height:18px;
font-size:12px;
display:flex;
align-items:center;
justify-content:center;
cursor:pointer;
}

</style>
</head>

<body>

<script>
if(!localStorage.getItem("userEmail")){
  window.location.href="login.html";
}
</script>

<div class="container">

<h2>اختر 6 فئات</h2>

<div class="grid" id="categories"></div>

<button onclick="next()">التالي</button>

</div>

<div class="selected-panel" id="selectedPanel"></div>

<script>

let selected = [];
let categoryData = [];

async function loadCategories(){
try{

const res = await fetch("/api/categories");
const data = await res.json();
categoryData = data;

const container = document.getElementById("categories");
container.innerHTML = "";

data.forEach(cat=>{

const div = document.createElement("div");
div.className="card";
div.dataset.name = cat.name;

div.innerHTML=`
<div class="info">i</div>
<img src="${cat.image}" onerror="this.src='https://via.placeholder.com/400x300'">
<div class="card-title">${cat.name}</div>
`;

div.onclick=()=>{
toggleCategory(cat);
};

container.appendChild(div);

});

}catch(err){
alert("فشل الاتصال بالسيرفر");
}
}

function toggleCategory(cat){

const index = selected.findIndex(c=>c.name===cat.name);

if(index !== -1){
selected.splice(index,1);
}else{
if(selected.length>=6) return;
selected.push(cat);
}

updateUI();
}

function updateUI(){

const cards = document.querySelectorAll(".card");

cards.forEach(card=>{
const name = card.dataset.name;
const isSelected = selected.find(c=>c.name===name);

card.classList.remove("selected","disabled");

if(isSelected){
card.classList.add("selected");
}
else if(selected.length===6){
card.classList.add("disabled");
}
});

renderSelectedPanel();
}

function renderSelectedPanel(){

const panel = document.getElementById("selectedPanel");
panel.innerHTML="";

selected.forEach(cat=>{
const div = document.createElement("div");
div.className="selected-item";

div.innerHTML=`
<img src="${cat.image}">
<div class="remove-btn">×</div>
`;

div.querySelector(".remove-btn").onclick=()=>{
selected = selected.filter(c=>c.name!==cat.name);
updateUI();
};

panel.appendChild(div);
});

}

function next(){
if(selected.length!==6){
alert("لازم تختار 6 فئات");
return;
}

const names = selected.map(c=>c.name);
localStorage.setItem("selectedCategories",JSON.stringify(names));
window.location.href="teams.html";
}

loadCategories();

</script>

</body>
</html>
