<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>اختيار الفئات</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">

<style>
body{
margin:0;
font-family:'Cairo',sans-serif;
direction:rtl;
background:#f3f3f3;
}

/* ===== عرض الصفحة مضبوط ===== */

.container{
max-width:1400px;
margin:auto;
padding:60px 40px 120px; /* قللنا البادينق */
}

h2{
text-align:center;
font-size:36px;
font-weight:900;
margin-bottom:70px;
}

/* ===== 4 أعمدة ثابتة فعلياً ===== */

.grid{
display:grid;
grid-template-columns:repeat(4, 1fr);
gap:40px;
}

/* ===== الكرت ===== */

.card{
position:relative;
background:white;
border-radius:22px;
overflow:hidden;
cursor:pointer;
transition:0.25s;
box-shadow:0 5px 12px rgba(0,0,0,0.08);
}

.card:hover{
transform:translateY(-3px);
}

.card.selected{
box-shadow:0 0 0 4px #ff7a3d;
}

/* ===== الصورة ===== */

.card img{
width:100%;
height:160px;
object-fit:cover;
display:block;
}

/* ===== الشريط البرتقالي ===== */

.card-title{
background:#ff7a3d;
color:white;
text-align:center;
padding:12px;
font-size:18px;
font-weight:bold;
}

/* ===== دائرة المعلومات ===== */

.info{
position:absolute;
top:10px;
left:10px;
width:28px;
height:28px;
background:#2d8cff;
color:white;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
font-weight:bold;
font-size:14px;
}

/* ===== زر ===== */

button{
margin:90px auto 0;
display:block;
padding:16px 45px;
background:#b30000;
border:none;
border-radius:28px;
color:white;
font-size:20px;
font-weight:bold;
cursor:pointer;
}

button:hover{
background:#8f0000;
}

/* موبايل */

@media(max-width:1100px){
.grid{
grid-template-columns:repeat(2, 1fr);
}
}

</style>
</head>

<body>

<script>
if(!localStorage.getItem("userEmail")){
  window.location.href="login.html";
}
</script>

<div class="container">

<h2>اختر 6 فئات</h2>

<div class="grid" id="categories"></div>

<button onclick="next()">التالي</button>

</div>

<script>

let selected = [];

async function loadCategories(){
try{

const res = await fetch("/api/categories");
const data = await res.json();
const container = document.getElementById("categories");
container.innerHTML = "";

data.forEach(cat=>{

const div = document.createElement("div");
div.className="card";

div.innerHTML=`
<div class="info">i</div>
<img src="${cat.image}" onerror="this.src='https://via.placeholder.com/400x300'">
<div class="card-title">${cat.name}</div>
`;

div.onclick=()=>{
if(selected.includes(cat.name)){
selected = selected.filter(c=>c!==cat.name);
div.classList.remove("selected");
}else{
if(selected.length>=6){
alert("تقدر تختار 6 فقط");
return;
}
selected.push(cat.name);
div.classList.add("selected");
}
};

container.appendChild(div);

});

}catch(err){
alert("فشل الاتصال بالسيرفر");
}
}

function next(){
if(selected.length!==6){
alert("لازم تختار 6 فئات");
return;
}

localStorage.setItem("selectedCategories",JSON.stringify(selected));
window.location.href="teams.html";
}

loadCategories();

</script>

</body>
</html>
