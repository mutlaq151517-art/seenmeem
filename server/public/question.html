<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>السؤال</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">

<style>
body{margin:0;font-family:'Cairo',sans-serif;direction:rtl;background:#f4f4f4;}

.topbar{
background:linear-gradient(to right,#ff3b3b,#ff7a3d);
color:white;
padding:15px 25px;
display:flex;
justify-content:space-between;
align-items:center;
}

.turn{background:#b30000;padding:8px 18px;border-radius:25px;font-weight:bold;}
.end-btn{background:black;color:white;padding:8px 18px;border-radius:25px;cursor:pointer;font-size:14px;}

.main-container{
display:flex;
gap:30px;
padding:40px;
}

.wrapper{flex:1;display:flex;justify-content:center;}

.card{
background:white;
width:100%;
border:8px solid #ff5c33;
border-radius:35px;
padding:60px 40px;
position:relative;
min-height:520px;
}

.timer-box{
position:absolute;
top:-30px;
left:50%;
transform:translateX(-50%);
background:#2d2b3a;
color:white;
padding:12px 35px;
border-radius:40px;
font-size:22px;
display:flex;
align-items:center;
gap:20px;
font-weight:bold;
}

.points{
position:absolute;
top:25px;
left:25px;
background:black;
color:white;
padding:8px 18px;
border-radius:20px;
font-size:14px;
}

.question{text-align:center;margin-top:60px;font-size:30px;font-weight:900;line-height:2;}
.question-image{text-align:center;margin-top:30px;}
.question-image img{max-width:300px;border-radius:20px;}

.buttons{
position:absolute;
bottom:25px;
width:100%;
display:flex;
justify-content:space-between;
padding:0 30px;
}

.btn{border:none;padding:12px 30px;border-radius:25px;color:white;cursor:pointer;font-size:18px;font-weight:bold;}
.green{background:#2e7d32;}
.orange{background:#ff7a3d;}

/* ===== Sidebar ===== */

.sidebar{
width:280px;
}

.team-box{
background:#b30000;
color:white;
padding:15px;
border-radius:25px;
text-align:center;
font-weight:bold;
margin-bottom:10px;
}

.score{
text-align:center;
font-size:24px;
margin-bottom:20px;
}

.helpers{
display:flex;
justify-content:center;
gap:10px;
margin-bottom:30px;
}

.helper{
width:45px;
height:45px;
border-radius:50%;
background:#e0e0e0;
display:flex;
align-items:center;
justify-content:center;
cursor:pointer;
}

.helper.used{
opacity:0.3;
pointer-events:none;
}
</style>
</head>
<body>

<div class="topbar">
<div class="end-btn" onclick="endGame()">إنهاء اللعبة</div>
<div>سين ميم</div>
<div class="turn" id="turnBox"></div>
</div>

<div class="main-container">

<div class="wrapper">
<div class="card">

<div class="timer-box">
<span id="pauseBtn">⏸</span>
<span id="timer">01:00</span>
<span id="resetBtn">⟳</span>
</div>

<div class="points" id="pointsBox"></div>

<div class="question" id="questionText"></div>

<div class="question-image" id="questionImageBox" style="display:none;">
<img id="questionImage">
</div>

<div class="buttons">
<button class="btn green" onclick="goAnswer()">الإجابة</button>
<button class="btn orange" id="categoryBtn"></button>
</div>

</div>
</div>

<!-- ===== Sidebar ===== -->

<div class="sidebar">

<div class="team-box" id="team1NameBox"></div>
<div class="score" id="score1Box"></div>
<div class="helpers">
<div class="helper" id="double1">✌</div>
<div class="helper" id="steal1">🕵</div>
<div class="helper" id="hole1">🕳</div>
</div>

<div class="team-box" id="team2NameBox"></div>
<div class="score" id="score2Box"></div>
<div class="helpers">
<div class="helper" id="double2">✌</div>
<div class="helper" id="steal2">🕵</div>
<div class="helper" id="hole2">🕳</div>
</div>

</div>

</div>

<script>

/* ===== بيانات ===== */

const team1 = localStorage.getItem("team1Name");
const team2 = localStorage.getItem("team2Name");

document.getElementById("team1NameBox").innerText = team1;
document.getElementById("team2NameBox").innerText = team2;
document.getElementById("score1Box").innerText = localStorage.getItem("score1") || 0;
document.getElementById("score2Box").innerText = localStorage.getItem("score2") || 0;

/* تعطيل الوسائل المستخدمة */

if(localStorage.getItem("doubleUsed1")) document.getElementById("double1").classList.add("used");
if(localStorage.getItem("stealUsed1")) document.getElementById("steal1").classList.add("used");
if(localStorage.getItem("holeUsed1")) document.getElementById("hole1").classList.add("used");

if(localStorage.getItem("doubleUsed2")) document.getElementById("double2").classList.add("used");
if(localStorage.getItem("stealUsed2")) document.getElementById("steal2").classList.add("used");
if(localStorage.getItem("holeUsed2")) document.getElementById("hole2").classList.add("used");

</script>

</body>
</html>
