<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>السؤال</title>

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">

<style>

body{
margin:0;
font-family:'Cairo',sans-serif;
direction:rtl;
background:#e6e6e6;
}

/* ===== Top Bar ===== */

.topbar{
background:linear-gradient(to right,#ff2e2e,#ff7a3d);
color:white;
padding:15px 30px;
display:flex;
justify-content:space-between;
align-items:center;
font-weight:bold;
}

.topbar .left,
.topbar .right{
display:flex;
gap:20px;
align-items:center;
}

.exit-btn{
background:black;
padding:8px 20px;
border-radius:20px;
cursor:pointer;
}

/* ===== Layout ===== */

.container{
display:flex;
padding:30px;
gap:30px;
}

/* ===== Question Board ===== */

.board-wrapper{
flex:1;
position:relative;
}

.board{
background:white;
border:8px solid #ff3b3b;
border-radius:40px;
padding:80px 40px;
min-height:500px;
position:relative;
}

/* Timer */

.timer{
position:absolute;
top:-35px;
left:50%;
transform:translateX(-50%);
background:#2e2b3f;
color:white;
padding:12px 35px;
border-radius:40px;
display:flex;
align-items:center;
gap:20px;
font-size:20px;
font-weight:bold;
}

.timer span{
cursor:pointer;
}

/* Points */

.points-box{
position:absolute;
top:20px;
right:20px;
background:black;
color:white;
padding:8px 20px;
border-radius:20px;
}

/* Question */

.question{
text-align:center;
font-size:30px;
font-weight:900;
line-height:2;
margin-top:40px;
}

.question-image{
text-align:center;
margin-top:30px;
}

.question-image img{
max-width:350px;
border-radius:20px;
}

/* Bottom Buttons */

.bottom-buttons{
position:absolute;
bottom:20px;
width:100%;
display:flex;
justify-content:space-between;
padding:0 40px;
}

.btn{
border:none;
padding:12px 30px;
border-radius:25px;
color:white;
cursor:pointer;
font-weight:bold;
font-size:16px;
}

.answer-btn{
background:#2e7d32;
}

.category-btn{
background:#ff7a3d;
}

/* ===== Sidebar ===== */

.sidebar{
width:280px;
}

.team-card{
margin-bottom:30px;
}

.team-name{
background:#b30000;
color:white;
padding:12px;
border-radius:30px;
text-align:center;
font-weight:bold;
}

.team-score{
text-align:center;
font-size:24px;
margin:10px 0;
}

.helpers{
display:flex;
justify-content:center;
gap:12px;
}

.helper{
width:45px;
height:45px;
border-radius:50%;
background:#e0e0e0;
display:flex;
align-items:center;
justify-content:center;
cursor:pointer;
font-size:18px;
}

.helper.used{
opacity:0.3;
pointer-events:none;
}

</style>
</head>

<body>

<div class="topbar">

<div class="left">
<div class="exit-btn" onclick="endGame()">إنهاء اللعبة</div>
</div>

<div>سين ميم</div>

<div class="right" id="turnBox"></div>

</div>

<div class="container">

<div class="board-wrapper">

<div class="board">

<div class="timer">
<span id="pauseBtn">⏸</span>
<span id="timer">01:00</span>
<span id="resetBtn">⟳</span>
</div>

<div class="points-box" id="pointsBox"></div>

<div class="question" id="questionText"></div>

<div class="question-image" id="questionImageBox" style="display:none;">
<img id="questionImage">
</div>

<div class="bottom-buttons">

<button class="btn answer-btn" onclick="goAnswer()">الإجابة</button>

<button class="btn category-btn" id="categoryBtn"></button>

</div>

</div>
</div>

<div class="sidebar">

<div class="team-card">

<div class="team-name" id="team1Name"></div>

<div class="team-score" id="score1"></div>

<div class="helpers">

<div class="helper" onclick="useDouble(1)" id="double1">✌</div>
<div class="helper" onclick="useSteal(1)" id="steal1">🕵</div>
<div class="helper" onclick="useHole(1)" id="hole1">🕳</div>

</div>

</div>

<div class="team-card">

<div class="team-name" id="team2Name"></div>

<div class="team-score" id="score2"></div>

<div class="helpers">

<div class="helper" onclick="useDouble(2)" id="double2">✌</div>
<div class="helper" onclick="useSteal(2)" id="steal2">🕵</div>
<div class="helper" onclick="useHole(2)" id="hole2">🕳</div>

</div>

</div>

</div>

</div>

<script>

/* ===== Load Question ===== */

const question = localStorage.getItem("currentQuestion");
const points = parseInt(localStorage.getItem("currentPoints"));
const category = localStorage.getItem("currentCategory");
const image = localStorage.getItem("currentQuestionImage");

if(!question){
alert("لا يوجد سؤال");
window.location.href="game.html";
}

document.getElementById("questionText").innerText = question;
document.getElementById("pointsBox").innerText = points + " نقطة";
document.getElementById("categoryBtn").innerText = category;

/* ===== IMAGE ===== */

if(image && image !== "null" && image !== ""){
document.getElementById("questionImageBox").style.display="block";
document.getElementById("questionImage").src=image;
}

/* ===== Teams ===== */

const team1 = localStorage.getItem("team1Name") || "فريق 1";
const team2 = localStorage.getItem("team2Name") || "فريق 2";

document.getElementById("team1Name").innerText = team1;
document.getElementById("team2Name").innerText = team2;

document.getElementById("score1").innerText = localStorage.getItem("score1") || 0;
document.getElementById("score2").innerText = localStorage.getItem("score2") || 0;

/* ===== TURN ===== */

let currentTeam = parseInt(localStorage.getItem("currentTeam"));

if(!currentTeam){
currentTeam=1;
localStorage.setItem("currentTeam",1);
}

document.getElementById("turnBox").innerText =
"دور فريق: " + (currentTeam===1?team1:team2);

/* ===== Navigation ===== */

function goAnswer(){

clearInterval(interval);

/* حفظ نقاط السؤال */
localStorage.setItem("answerPoints",points);

window.location.href="answer.html";

}

function endGame(){
localStorage.removeItem("matchStarted");
window.location.href="game.html";
}

</script>

</body>
</html>
