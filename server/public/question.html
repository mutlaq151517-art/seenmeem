<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>السؤال</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">

<style>
body{margin:0;font-family:'Cairo',sans-serif;direction:rtl;background:#f4f4f4;}

.topbar{
background:linear-gradient(to right,#ff3b3b,#ff7a3d);
color:white;
padding:15px 25px;
display:flex;
justify-content:space-between;
align-items:center;
}

.turn{background:#b30000;padding:8px 18px;border-radius:25px;font-weight:bold;}
.end-btn{background:black;color:white;padding:8px 18px;border-radius:25px;cursor:pointer;font-size:14px;}

.main-container{display:flex;gap:30px;padding:40px;}

.wrapper{flex:1;display:flex;justify-content:center;}

.card{
background:white;
width:100%;
border:8px solid #ff5c33;
border-radius:35px;
padding:60px 40px;
position:relative;
min-height:520px;
}

.timer-box{
position:absolute;
top:-30px;
left:50%;
transform:translateX(-50%);
background:#2d2b3a;
color:white;
padding:12px 35px;
border-radius:40px;
font-size:22px;
display:flex;
align-items:center;
gap:20px;
font-weight:bold;
}

.points{
position:absolute;
top:25px;
left:25px;
background:black;
color:white;
padding:8px 18px;
border-radius:20px;
font-size:14px;
}

.question{text-align:center;margin-top:60px;font-size:30px;font-weight:900;line-height:2;}
.question-image{text-align:center;margin-top:30px;}
.question-image img{max-width:300px;border-radius:20px;}

.buttons{
position:absolute;
bottom:25px;
width:100%;
display:flex;
justify-content:space-between;
padding:0 30px;
}

.btn{border:none;padding:12px 30px;border-radius:25px;color:white;cursor:pointer;font-size:18px;font-weight:bold;}
.green{background:#2e7d32;}
.orange{background:#ff7a3d;}

.sidebar{width:280px;}

.team-box{
background:#b30000;
color:white;
padding:15px;
border-radius:25px;
text-align:center;
font-weight:bold;
margin-bottom:10px;
}

.score{text-align:center;font-size:24px;margin-bottom:20px;}

.helpers{display:flex;justify-content:center;gap:10px;margin-bottom:30px;}

.helper{
width:45px;
height:45px;
border-radius:50%;
background:#e0e0e0;
display:flex;
align-items:center;
justify-content:center;
cursor:pointer;
font-size:18px;
}

.helper.used{
opacity:0.3;
pointer-events:none;
}
</style>
</head>
<body>

<div class="topbar">
<div class="end-btn" onclick="endGame()">إنهاء اللعبة</div>
<div>سين ميم</div>
<div class="turn" id="turnBox"></div>
</div>

<div class="main-container">

<div class="wrapper">
<div class="card">

<div class="timer-box">
<span id="pauseBtn">⏸</span>
<span id="timer">01:00</span>
<span id="resetBtn">⟳</span>
</div>

<div class="points" id="pointsBox"></div>

<div class="question" id="questionText"></div>

<div class="question-image" id="questionImageBox" style="display:none;">
<img id="questionImage">
</div>

<div class="buttons">
<button class="btn green" onclick="goAnswer()">الإجابة</button>
<button class="btn orange" id="categoryBtn"></button>
</div>

</div>
</div>

<div class="sidebar">

<div class="team-box" id="team1NameBox"></div>
<div class="score" id="score1Box"></div>
<div class="helpers">
<div class="helper" onclick="useDouble(1)" id="double1">✌</div>
<div class="helper" onclick="useSteal(1)" id="steal1">🕵</div>
<div class="helper" onclick="useHole(1)" id="hole1">🕳</div>
</div>

<div class="team-box" id="team2NameBox"></div>
<div class="score" id="score2Box"></div>
<div class="helpers">
<div class="helper" onclick="useDouble(2)" id="double2">✌</div>
<div class="helper" onclick="useSteal(2)" id="steal2">🕵</div>
<div class="helper" onclick="useHole(2)" id="hole2">🕳</div>
</div>

</div>

</div>

<script>

/* ===== جلب بيانات السؤال ===== */

const question = localStorage.getItem("currentQuestion");
const points = localStorage.getItem("currentPoints");
const category = localStorage.getItem("currentCategory");
const image = localStorage.getItem("currentQuestionImage");

if(!question){
window.location.href="game.html";
}

document.getElementById("questionText").innerText = question;
document.getElementById("pointsBox").innerText = points + " نقطة";
document.getElementById("categoryBtn").innerText = category;

if(image && image !== "null"){
document.getElementById("questionImageBox").style.display="block";
document.getElementById("questionImage").src = image;
}

/* ===== بيانات الفرق ===== */

const team1 = localStorage.getItem("team1Name");
const team2 = localStorage.getItem("team2Name");
let currentTeam = localStorage.getItem("currentTeam");

document.getElementById("team1NameBox").innerText = team1;
document.getElementById("team2NameBox").innerText = team2;
document.getElementById("score1Box").innerText = localStorage.getItem("score1") || 0;
document.getElementById("score2Box").innerText = localStorage.getItem("score2") || 0;

document.getElementById("turnBox").innerText =
"دور فريق: " + (currentTeam === "1" ? team1 : team2);

/* ===== وسائل المساعدة ===== */

function useDouble(team){
if(currentTeam != team) return alert("مو دورك");
if(localStorage.getItem("doubleUsed"+team)) return;
localStorage.setItem("doubleActive","true");
localStorage.setItem("doubleUsed"+team,"true");
document.getElementById("double"+team).classList.add("used");
}

function useSteal(team){
if(currentTeam == team) return alert("ما تقدر تسرق دورك");
if(localStorage.getItem("stealUsed"+team)) return;
localStorage.setItem("stealActive","true");
localStorage.setItem("stealTeam",team);
localStorage.setItem("stealUsed"+team,"true");
document.getElementById("steal"+team).classList.add("used");
}

function useHole(team){
if(currentTeam != team) return alert("مو دورك");
if(localStorage.getItem("holeUsed"+team)) return;
localStorage.setItem("holeActive","true");
localStorage.setItem("holeUsed"+team,"true");
document.getElementById("hole"+team).classList.add("used");
}

/* ===== Timer ===== */

let timeLeft = 60;
let interval;
let paused = false;

function formatTime(sec){
let m = Math.floor(sec/60);
let s = sec%60;
return `${m.toString().padStart(2,"0")}:${s.toString().padStart(2,"0")}`;
}

function startTimer(){
interval = setInterval(()=>{
if(!paused){
timeLeft--;
document.getElementById("timer").innerText = formatTime(timeLeft);
if(timeLeft <= 0){
clearInterval(interval);
}
}
},1000);
}

document.getElementById("timer").innerText = formatTime(timeLeft);
startTimer();

document.getElementById("pauseBtn").onclick = ()=>{
paused = !paused;
document.getElementById("pauseBtn").innerText = paused ? "▶" : "⏸";
}

document.getElementById("resetBtn").onclick = ()=>{
timeLeft = 60;
document.getElementById("timer").innerText = formatTime(timeLeft);
}

/* ===== أزرار ===== */

function goAnswer(){
clearInterval(interval);
window.location.href="answer.html";
}

function endGame(){
localStorage.removeItem("matchStarted");
window.location.href="game.html";
}

</script>

</body>
</html>
