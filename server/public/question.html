<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>السؤال</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">

<style>
body{
margin:0;
font-family:'Cairo',sans-serif;
direction:rtl;
background:#f4f4f4;
}

/* Top Bar */
.topbar{
background:linear-gradient(to right,#ff3b3b,#ff7a3d);
color:white;
padding:15px 25px;
display:flex;
justify-content:space-between;
align-items:center;
}

.turn{
background:#b30000;
padding:8px 18px;
border-radius:25px;
font-weight:bold;
}

.end-btn{
background:black;
color:white;
padding:8px 18px;
border-radius:25px;
cursor:pointer;
font-size:14px;
}

/* Card */
.wrapper{
padding:40px;
display:flex;
justify-content:center;
}

.card{
background:white;
width:85%;
border:8px solid #ff5c33;
border-radius:35px;
padding:60px 40px;
position:relative;
min-height:520px;
}

/* Timer */
.timer-box{
position:absolute;
top:-30px;
left:50%;
transform:translateX(-50%);
background:#2d2b3a;
color:white;
padding:12px 35px;
border-radius:40px;
font-size:22px;
display:flex;
align-items:center;
gap:20px;
font-weight:bold;
}

.timer-btn{
cursor:pointer;
font-size:20px;
}

/* Points */
.points{
position:absolute;
top:25px;
left:25px;
background:black;
color:white;
padding:8px 18px;
border-radius:20px;
font-size:14px;
}

/* Question */
.question{
text-align:center;
margin-top:60px;
font-size:30px;
font-weight:900;
line-height:2;
}

/* Image */
.question-image{
text-align:center;
margin-top:30px;
}

.question-image img{
max-width:300px;
border-radius:20px;
}

/* Buttons */
.buttons{
position:absolute;
bottom:25px;
width:100%;
display:flex;
justify-content:space-between;
padding:0 30px;
}

.btn{
border:none;
padding:12px 30px;
border-radius:25px;
color:white;
cursor:pointer;
font-size:18px;
font-weight:bold;
}

.green{background:#2e7d32;}
.orange{background:#ff7a3d;}
</style>
</head>
<body>

<div class="topbar">
<div class="end-btn" onclick="endGame()">إنهاء اللعبة</div>
<div>سين ميم</div>
<div class="turn" id="turnBox"></div>
</div>

<div class="wrapper">
<div class="card">

<div class="timer-box">
<span class="timer-btn" id="pauseBtn">⏸</span>
<span id="timer">01:00</span>
<span class="timer-btn" id="resetBtn">⟳</span>
</div>

<div class="points" id="pointsBox"></div>

<div class="question" id="questionText"></div>

<div class="question-image" id="questionImageBox" style="display:none;">
<img id="questionImage">
</div>

<div class="buttons">
<button class="btn green" onclick="goAnswer()">الإجابة</button>
<button class="btn orange" id="categoryBtn"></button>
</div>

</div>
</div>

<script>

const question = localStorage.getItem("currentQuestion");
const answer = localStorage.getItem("currentAnswer");
const points = localStorage.getItem("currentPoints");
const category = localStorage.getItem("currentCategory");
const teamTurn = localStorage.getItem("currentTeam");
const image = localStorage.getItem("currentImage");

/* حماية */
if(!question){
window.location.href="game.html";
}

document.getElementById("questionText").innerText = question;
document.getElementById("pointsBox").innerText = points + " نقطة";
document.getElementById("categoryBtn").innerText = category;
document.getElementById("turnBox").innerText = "دور فريق: " + teamTurn;

/* عرض صورة لو موجودة */
if(image){
document.getElementById("questionImageBox").style.display="block";
document.getElementById("questionImage").src = image;
}

/* Timer */

let timeLeft = 60;
let interval;
let paused = false;

function formatTime(sec){
let m = Math.floor(sec/60);
let s = sec%60;
return `${m.toString().padStart(2,"0")}:${s.toString().padStart(2,"0")}`;
}

function startTimer(){
interval = setInterval(()=>{
if(!paused){
timeLeft--;
document.getElementById("timer").innerText = formatTime(timeLeft);
if(timeLeft <= 0){
clearInterval(interval);
}
}
},1000);
}

document.getElementById("timer").innerText = formatTime(timeLeft);
startTimer();

document.getElementById("pauseBtn").onclick = ()=>{
paused = !paused;
document.getElementById("pauseBtn").innerText = paused ? "▶" : "⏸";
}

document.getElementById("resetBtn").onclick = ()=>{
timeLeft = 60;
document.getElementById("timer").innerText = formatTime(timeLeft);
}

function goAnswer(){
clearInterval(interval);
window.location.href="answer.html";
}

function endGame(){
if(confirm("هل تريد إنهاء اللعبة؟")){
localStorage.removeItem("matchStarted");
window.location.href="game.html";
}
}

</script>

</body>
</html>
