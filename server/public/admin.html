<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>لوحة التحكم - SeenMeem</title>

<style>
body{
margin:0;
font-family:Tahoma;
direction:rtl;
background:#f2f2f2;
}

/* شاشة القفل */
.lock-screen{
position:fixed;
inset:0;
background:#111;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
color:white;
z-index:9999;
}

.lock-screen input{
padding:12px;
border-radius:8px;
border:none;
width:250px;
margin-top:10px;
text-align:center;
}

.lock-screen button{
margin-top:15px;
padding:10px 20px;
border:none;
border-radius:8px;
background:#ff3b3b;
color:white;
cursor:pointer;
}

/* اللوحة */
.container{
max-width:1100px;
margin:60px auto;
background:white;
padding:30px;
border-radius:20px;
box-shadow:0 5px 20px rgba(0,0,0,0.1);
display:none;
}

h2{
text-align:center;
margin-bottom:30px;
}

.section{
margin-top:40px;
}

.card{
background:#eee;
padding:15px;
border-radius:12px;
margin-top:15px;
display:flex;
justify-content:space-between;
align-items:center;
flex-wrap:wrap;
gap:15px;
}

.small-btn{
background:black;
color:white;
font-size:12px;
padding:6px 10px;
border:none;
border-radius:6px;
cursor:pointer;
}

input{
padding:6px;
border-radius:6px;
border:1px solid #ccc;
}

.red{ background:#b30000; }
.green{ background:#2e7d32; }
.blue{ background:#1565c0; }
.orange{ background:#ff7a3d; }

</style>
</head>

<body>

<div class="lock-screen" id="lockScreen">
<h2>دخول لوحة المدير</h2>
<input type="password" id="adminPassword" placeholder="أدخل كلمة السر">
<button onclick="checkAdmin()">دخول</button>
</div>

<div class="container" id="adminPanel">

<h2>لوحة تحكم SeenMeem</h2>

<div class="section">
<h3>إدارة المستخدمين</h3>
<div id="usersList"></div>
</div>

</div>

<script>

/* ================= دخول المدير ================= */

async function checkAdmin(){

const password = document.getElementById("adminPassword").value;

const res = await fetch("/api/admin/master-login",{
method:"POST",
headers:{ "Content-Type":"application/json" },
body:JSON.stringify({ password })
});

if(!res.ok){
alert("كلمة السر غير صحيحة");
return;
}

localStorage.setItem("adminAccess","true");

document.getElementById("lockScreen").style.display="none";
document.getElementById("adminPanel").style.display="block";

loadUsers();
}

if(localStorage.getItem("adminAccess")==="true"){
document.getElementById("lockScreen").style.display="none";
document.getElementById("adminPanel").style.display="block";
loadUsers();
}

/* ================= المستخدمين ================= */

async function loadUsers(){

const adminEmail = prompt("أدخل إيميل حساب الأدمن");

const res = await fetch("/api/admin/users",{
method:"POST",
headers:{ "Content-Type":"application/json" },
body:JSON.stringify({ email: adminEmail })
});

if(!res.ok){
alert("غير مصرح");
return;
}

const users = await res.json();

const list = document.getElementById("usersList");
list.innerHTML="";

users.forEach(user=>{

list.innerHTML+=`
<div class="card">

<div style="min-width:250px;">
<b>${user.name}</b><br>
${user.email}<br>
الرصيد: ${user.games_balance} |
المستوى: ${user.level} |
الصلاحية: ${user.role}
</div>

<div>
<input type="number" id="balance-${user._id}" placeholder="رصيد جديد">
<button class="small-btn blue" onclick="updateUser('${user._id}','${user.email}')">تحديث</button>
<button class="small-btn green" onclick="makeAdmin('${user._id}','${user.email}')">Admin</button>
<button class="small-btn orange" onclick="makeUser('${user._id}','${user.email}')">User</button>
<button class="small-btn red" onclick="resetPass('${user._id}','${user.email}')">إعادة كلمة السر</button>
<button class="small-btn" onclick="deleteUser('${user._id}','${user.email}')">حذف</button>
</div>

</div>
`;
});
}

/* ===== تعديل الرصيد ===== */

async function updateUser(userId,userEmail){

const adminEmail = prompt("أدخل إيميل الأدمن");
const balance = document.getElementById("balance-"+userId).value;

await fetch("/api/admin/update-user",{
method:"POST",
headers:{ "Content-Type":"application/json" },
body:JSON.stringify({
adminEmail,
userId,
games_balance: balance
})
});

loadUsers();
}

/* ===== تغيير صلاحية ===== */

async function makeAdmin(userId){
const adminEmail = prompt("أدخل إيميل الأدمن");

await fetch("/api/admin/update-user",{
method:"POST",
headers:{ "Content-Type":"application/json" },
body:JSON.stringify({
adminEmail,
userId,
role:"admin"
})
});

loadUsers();
}

async function makeUser(userId){
const adminEmail = prompt("أدخل إيميل الأدمن");

await fetch("/api/admin/update-user",{
method:"POST",
headers:{ "Content-Type":"application/json" },
body:JSON.stringify({
adminEmail,
userId,
role:"user"
})
});

loadUsers();
}

/* ===== إعادة تعيين كلمة السر ===== */

async function resetPass(userId){

const adminEmail = prompt("أدخل إيميل الأدمن");

const res = await fetch("/api/admin/reset-password",{
method:"POST",
headers:{ "Content-Type":"application/json" },
body:JSON.stringify({
adminEmail,
userId
})
});

const data = await res.json();

if(data.newPassword){
alert("كلمة السر الجديدة: " + data.newPassword);
}

}

/* ===== حذف مستخدم ===== */

async function deleteUser(userId){

if(!confirm("متأكد من حذف المستخدم؟")) return;

const adminEmail = prompt("أدخل إيميل الأدمن");

await fetch("/api/admin/delete-user",{
method:"POST",
headers:{ "Content-Type":"application/json" },
body:JSON.stringify({
adminEmail,
userId
})
});

loadUsers();
}

</script>

</body>
</html>
