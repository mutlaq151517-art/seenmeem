<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>لوحة التحكم - SeenMeem</title>

<style>
body{margin:0;font-family:Tahoma;direction:rtl;background:#f2f2f2;}
.lock-screen{position:fixed;inset:0;background:#111;display:flex;justify-content:center;align-items:center;flex-direction:column;color:white;z-index:9999;}
.lock-screen input{padding:12px;border-radius:8px;border:none;width:250px;margin-top:10px;text-align:center;}
.lock-screen button{margin-top:15px;padding:10px 20px;border:none;border-radius:8px;background:#ff3b3b;color:white;cursor:pointer;}
.container{max-width:1200px;margin:60px auto;background:white;padding:30px;border-radius:20px;box-shadow:0 5px 20px rgba(0,0,0,0.1);display:none;}
.tabs{display:flex;gap:20px;margin-bottom:30px;}
.tab-btn{padding:10px 20px;border:none;border-radius:8px;cursor:pointer;background:#ddd;font-weight:bold;}
.tab-btn.active{background:#b30000;color:white;}
.section{display:none;}
.section.active{display:block;}
.card{background:#eee;padding:15px;border-radius:12px;margin-top:15px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:15px;}
.small-btn{background:black;color:white;font-size:12px;padding:6px 10px;border:none;border-radius:6px;cursor:pointer;}
input{padding:6px;border-radius:6px;border:1px solid #ccc;margin-bottom:10px;width:100%;}
.red{ background:#b30000; }
.green{ background:#2e7d32; }
.blue{ background:#1565c0; }
.orange{ background:#ff7a3d; }
</style>
</head>

<body>

<div class="lock-screen" id="lockScreen">
<h2>دخول لوحة المدير</h2>
<input type="password" id="adminPassword" placeholder="أدخل كلمة السر">
<button onclick="checkAdmin()">دخول</button>
</div>

<div class="container" id="adminPanel">

<h2>لوحة تحكم SeenMeem</h2>

<div class="tabs">
<button class="tab-btn active" onclick="showTab('users',this)">إدارة المستخدمين</button>
<button class="tab-btn" onclick="showTab('categories',this)">إدارة الفئات</button>
</div>

<div id="users" class="section active">
<h3>المستخدمين</h3>
<div id="usersList"></div>
</div>

<div id="categories" class="section">
<h3>إضافة فئة جديدة</h3>
<input type="text" id="sectionInput" placeholder="اسم القسم">
<input type="text" id="nameInput" placeholder="اسم الفئة">
<input type="text" id="imageInput" placeholder="رابط الصورة">
<button class="green small-btn" onclick="addCategory()">إضافة فئة</button>
<h3 style="margin-top:30px;">الفئات الحالية</h3>
<div id="categoriesList"></div>
</div>

</div>

<script>

let adminPassword = null;

function checkAdmin(){
adminPassword = document.getElementById("adminPassword").value;
localStorage.setItem("adminPassword",adminPassword);
document.getElementById("lockScreen").style.display="none";
document.getElementById("adminPanel").style.display="block";
loadUsers();
loadCategories();
}

if(localStorage.getItem("adminPassword")){
adminPassword = localStorage.getItem("adminPassword");
document.getElementById("lockScreen").style.display="none";
document.getElementById("adminPanel").style.display="block";
loadUsers();
loadCategories();
}

function showTab(id,btn){
document.querySelectorAll(".section").forEach(sec=>sec.classList.remove("active"));
document.querySelectorAll(".tab-btn").forEach(b=>b.classList.remove("active"));
document.getElementById(id).classList.add("active");
btn.classList.add("active");
}

/* ===== USERS ===== */

async function loadUsers(){

const res = await fetch("/api/admin/users",{
method:"POST",
headers:{ "Content-Type":"application/json" },
body:JSON.stringify({ password: adminPassword })
});

if(!res.ok){
alert("كلمة السر غير صحيحة");
return;
}

const users = await res.json();
const list = document.getElementById("usersList");
list.innerHTML="";

users.forEach(user=>{
list.innerHTML+=`
<div class="card">
<div>
<b>${user.name}</b><br>
${user.email}<br>
رصيد: ${user.games_balance} | مستوى: ${user.level} | صلاحية: ${user.role}
</div>
<div style="min-width:200px;">
<input type="number" id="bal-${user._id}" placeholder="أدخل عدد الألعاب">
<button class="small-btn blue" onclick="updateUser('${user._id}')">إضافة رصيد</button>
<button class="small-btn green" onclick="makeAdmin('${user._id}')">Admin</button>
<button class="small-btn orange" onclick="makeUser('${user._id}')">User</button>
<button class="small-btn red" onclick="resetPass('${user._id}')">إعادة كلمة السر</button>
<button class="small-btn" onclick="deleteUser('${user._id}')">حذف</button>
</div>
</div>
`;
});
}

async function updateUser(id){

const input=document.getElementById("bal-"+id);
const balance=input.value.trim();

if(balance === ""){
alert("اكتب رقم أولاً");
return;
}

if(isNaN(balance) || Number(balance) <= 0){
alert("اكتب رقم صحيح أكبر من صفر");
return;
}

await fetch("/api/admin/update-user",{
method:"POST",
headers:{ "Content-Type":"application/json" },
body:JSON.stringify({
password:adminPassword,
userId:id,
games_balance:Number(balance)
})
});

input.value="";
loadUsers();
}

async function makeAdmin(id){
await fetch("/api/admin/update-user",{
method:"POST",
headers:{ "Content-Type":"application/json" },
body:JSON.stringify({ password:adminPassword,userId:id,role:"admin" })
});
loadUsers();
}

async function makeUser(id){
await fetch("/api/admin/update-user",{
method:"POST",
headers:{ "Content-Type":"application/json" },
body:JSON.stringify({ password:adminPassword,userId:id,role:"user" })
});
loadUsers();
}

async function resetPass(id){
const res=await fetch("/api/admin/reset-password",{
method:"POST",
headers:{ "Content-Type":"application/json" },
body:JSON.stringify({ password:adminPassword,userId:id })
});
const data=await res.json();
if(data.newPassword) alert("كلمة السر الجديدة: "+data.newPassword);
}

async function deleteUser(id){
if(!confirm("متأكد من الحذف؟")) return;
await fetch("/api/admin/delete-user",{
method:"POST",
headers:{ "Content-Type":"application/json" },
body:JSON.stringify({ password:adminPassword,userId:id })
});
loadUsers();
}

/* ===== CATEGORIES ===== */

async function loadCategories(){

const res=await fetch("/api/admin/categories",{
method:"POST",
headers:{ "Content-Type":"application/json" },
body:JSON.stringify({ password:adminPassword })
});

const data=await res.json();
const list=document.getElementById("categoriesList");
list.innerHTML="";

data.forEach(cat=>{
list.innerHTML+=`
<div class="card">
<div>${cat.section} - ${cat.name}</div>
<button class="small-btn red" onclick="deleteCategory('${cat._id}')">حذف</button>
</div>
`;
});
}

async function addCategory(){
const section=document.getElementById("sectionInput").value;
const name=document.getElementById("nameInput").value;
const image=document.getElementById("imageInput").value;

await fetch("/api/admin/add-category",{
method:"POST",
headers:{ "Content-Type":"application/json" },
body:JSON.stringify({ password:adminPassword,section,name,image })
});

loadCategories();
}

async function deleteCategory(id){
await fetch("/api/admin/delete-category",{
method:"POST",
headers:{ "Content-Type":"application/json" },
body:JSON.stringify({ password:adminPassword,id })
});
loadCategories();
}

</script>

</body>
</html>
