<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>لوحة التحكم - SeenMeem</title>

<style>
body{
margin:0;
font-family:Tahoma;
direction:rtl;
background:#f2f2f2;
}

.container{
max-width:900px;
margin:60px auto;
background:white;
padding:30px;
border-radius:20px;
box-shadow:0 5px 20px rgba(0,0,0,0.1);
}

h2{
text-align:center;
margin-bottom:30px;
}

input{
width:100%;
padding:10px;
margin-bottom:10px;
border-radius:10px;
border:1px solid #ddd;
}

button{
padding:8px 15px;
border:none;
border-radius:8px;
background:linear-gradient(to right,#ff3b3b,#b30000);
color:white;
cursor:pointer;
}

.section{
margin-top:40px;
}

.card{
background:#eee;
padding:10px;
border-radius:10px;
margin-top:10px;
display:flex;
justify-content:space-between;
align-items:center;
flex-wrap:wrap;
gap:10px;
}

.small-btn{
background:black;
font-size:12px;
padding:5px 10px;
}

.progress-container{
background:#ddd;
height:15px;
border-radius:20px;
overflow:hidden;
margin-top:8px;
}

.progress-bar{
height:100%;
background:linear-gradient(to right,#ff3b3b,#b30000);
width:0%;
transition:0.4s;
}

.progress-text{
font-size:12px;
margin-top:4px;
}
</style>
</head>

<body>

<script>
if(localStorage.getItem("role") !== "admin"){
alert("غير مصرح لك بالدخول");
window.location.href="home.html";
}
</script>

<div class="container">

<h2>لوحة تحكم SeenMeem</h2>

<!-- ================= تقدم بنك الأسئلة ================= -->

<div class="section">
<h3>تقدم بنك الأسئلة (من 1000 لكل فئة)</h3>
<button onclick="loadProgress()">تحديث التقدم</button>
<div id="progressList"></div>
</div>

<!-- ================= المستخدمين ================= -->

<div class="section">
<h3>إدارة المستخدمين</h3>
<div id="usersList"></div>
</div>

<!-- ================= الفئات ================= -->

<div class="section">
<h3>إضافة فئة جديدة</h3>

<input type="text" id="section" placeholder="اسم القسم">
<input type="text" id="name" placeholder="اسم الفئة">
<input type="text" id="image" placeholder="رابط صورة الفئة">

<button onclick="addCategory()">إضافة فئة</button>

<h3 style="margin-top:30px;">الفئات الحالية</h3>
<div id="categoriesList"></div>
</div>

</div>

<script>

const adminEmail = localStorage.getItem("userEmail");

/* ================= Progress ================= */

async function loadProgress(){

const res = await fetch("/api/admin/questions-progress",{
method:"POST",
headers:{ "Content-Type":"application/json" },
body:JSON.stringify({ adminEmail })
});

const data = await res.json();
const list = document.getElementById("progressList");
list.innerHTML="";

data.forEach(item=>{

const percent = Math.min((item.count/1000)*100,100).toFixed(1);

list.innerHTML+=`
<div class="card" style="flex-direction:column; align-items:stretch;">
<div><b>${item.category}</b></div>

<div class="progress-container">
<div class="progress-bar" style="width:${percent}%"></div>
</div>

<div class="progress-text">
${item.count} / 1000 (${percent}%)
</div>
</div>
`;
});
}

/* ================= المستخدمين ================= */

async function loadUsers(){
const res = await fetch("/api/admin/users",{
method:"POST",
headers:{ "Content-Type":"application/json" },
body:JSON.stringify({ email:adminEmail })
});

const users = await res.json();
const list = document.getElementById("usersList");
list.innerHTML="";

users.forEach(user=>{
list.innerHTML+=`
<div class="card">
<div>
<b>${user.name}</b><br>
${user.email}<br>
رصيد: ${user.games_balance} | مستوى: ${user.level} | صلاحية: ${user.role}
</div>

<div>
<input type="number" id="balance-${user.email}" placeholder="رصيد جديد">
<button class="small-btn" onclick="updateBalance('${user.email}')">تعديل الرصيد</button>
<button class="small-btn" onclick="changeRole('${user.email}','admin')">جعله Admin</button>
<button class="small-btn" onclick="changeRole('${user.email}','user')">جعله User</button>
</div>
</div>
`;
});
}

async function updateBalance(userEmail){
const balance = document.getElementById("balance-"+userEmail).value;

await fetch("/api/admin/update-balance",{
method:"POST",
headers:{ "Content-Type":"application/json" },
body:JSON.stringify({ adminEmail,userEmail,balance })
});

loadUsers();
}

async function changeRole(userEmail,role){
await fetch("/api/admin/change-role",{
method:"POST",
headers:{ "Content-Type":"application/json" },
body:JSON.stringify({ adminEmail,userEmail,role })
});
loadUsers();
}

/* ================= الفئات ================= */

async function loadCategories(){
const res = await fetch("/api/categories");
const data = await res.json();

const list = document.getElementById("categoriesList");
list.innerHTML="";

data.forEach(cat=>{
list.innerHTML+=`
<div class="card">
<div>
${cat.section} - ${cat.name}
</div>
<button onclick="deleteCategory('${cat._id}')">حذف</button>
</div>
`;
});
}

async function addCategory(){
const section=document.getElementById("section").value;
const name=document.getElementById("name").value;
const image=document.getElementById("image").value;

await fetch("/api/admin/add-category",{
method:"POST",
headers:{ "Content-Type":"application/json" },
body:JSON.stringify({ email:adminEmail,section,name,image })
});

loadCategories();
}

async function deleteCategory(id){
await fetch("/api/admin/delete-category",{
method:"POST",
headers:{ "Content-Type":"application/json" },
body:JSON.stringify({ email:adminEmail,id })
});
loadCategories();
}

/* تحميل البيانات */
loadUsers();
loadCategories();
loadProgress();

</script>

</body>
</html>
