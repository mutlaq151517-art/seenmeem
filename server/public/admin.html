<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>لوحة التحكم - SeenMeem</title>

<style>
body{
margin:0;
font-family:Tahoma;
direction:rtl;
background:#f2f2f2;
}

.container{
max-width:600px;
margin:60px auto;
background:white;
padding:30px;
border-radius:20px;
box-shadow:0 5px 20px rgba(0,0,0,0.1);
}

h2{
text-align:center;
margin-bottom:30px;
}

input{
width:100%;
padding:12px;
margin-bottom:15px;
border-radius:10px;
border:1px solid #ddd;
}

button{
width:100%;
padding:12px;
border:none;
border-radius:12px;
background:linear-gradient(to right,#ff3b3b,#b30000);
color:white;
font-size:16px;
cursor:pointer;
}

.category{
background:#eee;
padding:10px;
border-radius:10px;
margin-top:10px;
display:flex;
justify-content:space-between;
align-items:center;
}

img{
width:40px;
height:40px;
border-radius:8px;
}
</style>
</head>

<body>

<div class="container">

<h2>إضافة فئة جديدة</h2>

<input type="text" id="section" placeholder="اسم القسم (مثال: الكويت)">
<input type="text" id="name" placeholder="اسم الفئة">
<input type="text" id="image" placeholder="رابط صورة الفئة">

<button onclick="addCategory()">إضافة</button>

<hr>

<h3>الفئات الحالية</h3>
<div id="list"></div>

</div>

<script>

const API = "";

async function loadCategories(){
const res = await fetch("/api/categories");
const data = await res.json();

const list = document.getElementById("list");
list.innerHTML="";

data.forEach(cat=>{
list.innerHTML+=`
<div class="category">
<div>
<img src="${cat.image}">
${cat.section} - ${cat.name}
</div>
<button onclick="deleteCategory('${cat._id}')">حذف</button>
</div>
`;
});
}

async function addCategory(){
const section=document.getElementById("section").value;
const name=document.getElementById("name").value;
const image=document.getElementById("image").value;

const email=localStorage.getItem("userEmail");

await fetch("/api/admin/add-category",{
method:"POST",
headers:{ "Content-Type":"application/json" },
body:JSON.stringify({ email,section,name,image })
});

loadCategories();
}

async function deleteCategory(id){
const email=localStorage.getItem("userEmail");

await fetch("/api/admin/delete-category",{
method:"POST",
headers:{ "Content-Type":"application/json" },
body:JSON.stringify({ email,id })
});

loadCategories();
}

loadCategories();

</script>

</body>
</html>
