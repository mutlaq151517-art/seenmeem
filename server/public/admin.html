<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>لوحة التحكم - SeenMeem</title>

<style>
body{
margin:0;
font-family:Tahoma;
direction:rtl;
background:#f2f2f2;
}

/* شاشة القفل */
.lock-screen{
position:fixed;
inset:0;
background:#111;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
color:white;
z-index:9999;
}

.lock-screen input{
padding:12px;
border-radius:8px;
border:none;
width:250px;
margin-top:10px;
text-align:center;
}

.lock-screen button{
margin-top:15px;
padding:10px 20px;
border:none;
border-radius:8px;
background:#ff3b3b;
color:white;
cursor:pointer;
}

/* اللوحة */
.container{
max-width:900px;
margin:60px auto;
background:white;
padding:30px;
border-radius:20px;
box-shadow:0 5px 20px rgba(0,0,0,0.1);
display:none;
}

h2{
text-align:center;
margin-bottom:30px;
}

input{
width:100%;
padding:10px;
margin-bottom:10px;
border-radius:10px;
border:1px solid #ddd;
}

button{
padding:8px 15px;
border:none;
border-radius:8px;
background:linear-gradient(to right,#ff3b3b,#b30000);
color:white;
cursor:pointer;
}

.section{
margin-top:40px;
}

.card{
background:#eee;
padding:10px;
border-radius:10px;
margin-top:10px;
display:flex;
justify-content:space-between;
align-items:center;
flex-wrap:wrap;
gap:10px;
}

.small-btn{
background:black;
font-size:12px;
padding:5px 10px;
}
</style>
</head>

<body>

<!-- شاشة كلمة السر -->
<div class="lock-screen" id="lockScreen">
<h2>دخول لوحة المدير</h2>
<input type="password" id="adminPassword" placeholder="أدخل كلمة السر">
<button onclick="checkAdmin()">دخول</button>
</div>

<!-- اللوحة -->
<div class="container" id="adminPanel">

<h2>لوحة تحكم SeenMeem</h2>

<div class="section">
<h3>إدارة المستخدمين</h3>
<div id="usersList"></div>
</div>

<div class="section">
<h3>إضافة فئة جديدة</h3>

<input type="text" id="section" placeholder="اسم القسم">
<input type="text" id="name" placeholder="اسم الفئة">
<input type="text" id="image" placeholder="رابط صورة الفئة">

<button onclick="addCategory()">إضافة فئة</button>

<h3 style="margin-top:30px;">الفئات الحالية</h3>
<div id="categoriesList"></div>
</div>

</div>

<script>

async function checkAdmin(){

const password = document.getElementById("adminPassword").value;

const res = await fetch("/api/admin/master-login",{
method:"POST",
headers:{ "Content-Type":"application/json" },
body:JSON.stringify({ password })
});

if(!res.ok){
alert("كلمة السر غير صحيحة");
return;
}

localStorage.setItem("adminAccess","true");

document.getElementById("lockScreen").style.display="none";
document.getElementById("adminPanel").style.display="block";

loadUsers();
loadCategories();
}

/* إذا سبق دخل */
if(localStorage.getItem("adminAccess")==="true"){
document.getElementById("lockScreen").style.display="none";
document.getElementById("adminPanel").style.display="block";
loadUsers();
loadCategories();
}

/* ================= المستخدمين ================= */

async function loadUsers(){
const res = await fetch("/api/admin/users",{
method:"POST",
headers:{ "Content-Type":"application/json" },
body:JSON.stringify({ email:"master" })
});

if(!res.ok) return;

const users = await res.json();

const list = document.getElementById("usersList");
list.innerHTML="";

users.forEach(user=>{
list.innerHTML+=`
<div class="card">
<div>
<b>${user.name}</b><br>
${user.email}<br>
رصيد: ${user.games_balance} | مستوى: ${user.level} | صلاحية: ${user.role}
</div>

<div>
<input type="number" id="balance-${user.email}" placeholder="رصيد جديد">
<button class="small-btn" onclick="updateBalance('${user.email}')">تعديل الرصيد</button>
<button class="small-btn" onclick="changeRole('${user.email}','admin')">جعله Admin</button>
<button class="small-btn" onclick="changeRole('${user.email}','user')">جعله User</button>
</div>
</div>
`;
});
}

async function updateBalance(userEmail){
const balance = document.getElementById("balance-"+userEmail).value;

await fetch("/api/admin/update-balance",{
method:"POST",
headers:{ "Content-Type":"application/json" },
body:JSON.stringify({
adminEmail:"master",
userEmail,
balance
})
});

loadUsers();
}

async function changeRole(userEmail,role){

await fetch("/api/admin/change-role",{
method:"POST",
headers:{ "Content-Type":"application/json" },
body:JSON.stringify({
adminEmail:"master",
userEmail,
role
})
});

loadUsers();
}

/* ================= الفئات ================= */

async function loadCategories(){
const res = await fetch("/api/categories");
const data = await res.json();

const list = document.getElementById("categoriesList");
list.innerHTML="";

data.forEach(cat=>{
list.innerHTML+=`
<div class="card">
<div>
${cat.section} - ${cat.name}
</div>
<button onclick="deleteCategory('${cat._id}')">حذف</button>
</div>
`;
});
}

async function addCategory(){

const section=document.getElementById("section").value;
const name=document.getElementById("name").value;
const image=document.getElementById("image").value;

await fetch("/api/admin/add-category",{
method:"POST",
headers:{ "Content-Type":"application/json" },
body:JSON.stringify({ email:"master",section,name,image })
});

loadCategories();
}

async function deleteCategory(id){

await fetch("/api/admin/delete-category",{
method:"POST",
headers:{ "Content-Type":"application/json" },
body:JSON.stringify({ email:"master",id })
});

loadCategories();
}

</script>

</body>
</html>
