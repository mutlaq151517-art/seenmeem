<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>سين ميم</title>

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box
}

body{
font-family:'Cairo',sans-serif;
background:#cfcfcf;
padding-top:85px;
}

/* ===== TOP BAR ===== */

.topbar{
position:fixed;
top:0;
right:0;
left:0;
width:100%;
height:85px;

background:linear-gradient(90deg,#ff3b3b,#ff7a3d);

display:grid;
grid-template-columns:1fr auto 1fr;
align-items:center;

padding:0 50px;

color:white;
font-weight:700;

z-index:9999;
}

.top-left{
display:flex;
gap:30px;
align-items:center;
font-size:18px;
}

.top-left span{
cursor:pointer;
display:flex;
gap:6px;
align-items:center;
}

.top-center{
font-size:22px;
font-weight:900;
text-align:center;
}

.top-right{
display:flex;
justify-content:flex-end;
}

.turn-box{
background:#c40000;
padding:10px 28px;
border-radius:40px;
font-weight:900;
}

/* ===== BOARD ===== */

.board-wrapper{
padding:40px 60px;
}

.board{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:40px;
}

.category-card{
background:#e7e7e7;
border-radius:35px;
padding:20px;
display:flex;
justify-content:space-between;
align-items:center;
}

.points{
display:flex;
flex-direction:column;
gap:16px;
}

.point{
width:140px;
height:50px;
background:#d8d8d8;
border-radius:50px;
display:flex;
align-items:center;
justify-content:center;
font-weight:900;
font-size:22px;
color:#b30000;
}

.category-center{
text-align:center;
}

.category-center img{
width:120px;
height:120px;
object-fit:contain;
}

.category-title{
margin-top:8px;
background:#ff7a3d;
color:#fff;
padding:8px 20px;
border-radius:20px;
font-weight:900;
}

/* ===== BOTTOM ===== */

.bottom{
margin-top:40px;
background:#e7e7e7;
padding:40px 80px;

display:grid;
grid-template-columns:1fr auto 1fr;
align-items:center;
}

.team{
display:flex;
flex-direction:column;
gap:10px;
align-items:center;
}

.team-name{
background:#c40000;
color:#fff;
padding:12px 90px;
border-radius:40px;
font-weight:900;
font-size:20px;
}

.team-row{
display:flex;
align-items:center;
gap:25px;
}

.helpers{
display:flex;
flex-direction:column;
align-items:center;
gap:6px;
}

.helpers-title{
font-weight:700;
}

.helpers-icons{
display:flex;
gap:10px;
}

.helper{
width:40px;
height:40px;
border-radius:50%;
background:#d8d8d8;
display:flex;
align-items:center;
justify-content:center;
font-size:18px;
cursor:pointer;
}

.score{
background:#d8d8d8;
border-radius:40px;
padding:6px 14px;
display:flex;
align-items:center;
gap:12px;
}

.score button{
background:#c40000;
color:#fff;
border:none;
width:30px;
height:30px;
border-radius:50%;
font-size:18px;
cursor:pointer;
}

.score-value{
font-weight:900;
font-size:18px;
width:25px;
text-align:center;
}

.center-logo{
font-size:48px;
font-weight:900;
color:#555;
text-align:center;
}

</style>
</head>

<body>

<!-- ===== TOP BAR ===== -->

<div class="topbar">

<div class="top-left">
<span>🚪 الخروج</span>
<span>⬜ الرجوع للوحة</span>
<span>➡️ انتهاء اللعبة</span>
<span>🔄</span>
</div>

<div class="top-center">Gg</div>

<div class="top-right">
<div class="turn-box">دور فريق : مطلق</div>
</div>

</div>

<!-- ===== BOARD ===== -->

<div class="board-wrapper">
<div class="board" id="board"></div>
</div>

<!-- ===== BOTTOM ===== -->

<div class="bottom">

<div class="team">
<div class="team-name">فلاح</div>

<div class="team-row">

<div class="score">
<button onclick="changeScore(1,-100)">-</button>
<div class="score-value" id="score1">0</div>
<button onclick="changeScore(1,100)">+</button>
</div>

<div class="helpers">
<div class="helpers-title">وسائل المساعدة</div>
<div class="helpers-icons">
<div class="helper">🔁</div>
<div class="helper">📞</div>
<div class="helper">✌</div>
</div>
</div>

</div>
</div>

<div class="center-logo">Boubyan</div>

<div class="team">

<div class="team-name">مطلق</div>

<div class="team-row">

<div class="helpers">
<div class="helpers-title">وسائل المساعدة</div>
<div class="helpers-icons">
<div class="helper">🔁</div>
<div class="helper">📞</div>
<div class="helper">✌</div>
</div>
</div>

<div class="score">
<button onclick="changeScore(2,-100)">-</button>
<div class="score-value" id="score2">0</div>
<button onclick="changeScore(2,100)">+</button>
</div>

</div>
</div>

</div>

<script>

let score1=0
let score2=0

function changeScore(team,val){

if(team===1){
score1+=val
document.getElementById("score1").innerText=score1
}

else{
score2+=val
document.getElementById("score2").innerText=score2
}

}

/* demo categories */

const cats=[
{img:"/images/1.png",name:"ولا كلمة"},
{img:"/images/2.png",name:"الحبالة"},
{img:"/images/3.png",name:"House of the Dragon"},
{img:"/images/4.png",name:"حروف متحركة"},
{img:"/images/5.png",name:"ولا كلمة عامة"},
{img:"/images/6.png",name:"حروف"}
]

const board=document.getElementById("board")

cats.forEach(c=>{

const card=document.createElement("div")
card.className="category-card"

card.innerHTML=`

<div class="points">
<div class="point">200</div>
<div class="point">400</div>
<div class="point">600</div>
</div>

<div class="category-center">
<img src="${c.img}">
<div class="category-title">${c.name}</div>
</div>

<div class="points">
<div class="point">200</div>
<div class="point">400</div>
<div class="point">600</div>
</div>

`

board.appendChild(card)

})

</script>

</body>
</html>
