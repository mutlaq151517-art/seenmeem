<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>سين ميم</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
}

html,body{
width:100%;
overflow-x:hidden;
}

body{
font-family:'Cairo',sans-serif;
direction:rtl;
background:#cfcfcf;
}

/* ===== TOP BAR ===== */

.topbar{
width:100vw; /* يمتد فعلياً لنهاية الشاشة */
background:linear-gradient(to right,#ff3b3b,#ff7a3d);
height:95px;
display:flex;
align-items:center;
justify-content:space-between;
padding:0 80px;
color:white;
font-weight:700;
}

.turn{
background:#c40000;
padding:14px 35px;
border-radius:60px;
font-weight:900;
font-size:18px;
}

/* ===== BOARD ===== */

.board-wrapper{
padding:60px 120px;
}

.board{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:70px;
}

/* ===== CARD ===== */

.category-card{
background:#e6e6e6;
border-radius:45px;
padding:35px;
display:flex;
align-items:center;
justify-content:space-between;
}

/* ===== POINTS ===== */

.points-col{
display:flex;
flex-direction:column;
gap:25px;
}

.point{
background:#d8d8d8;
height:65px;
min-width:190px;
border-radius:70px;
display:flex;
align-items:center;
justify-content:center;
font-size:28px;
font-weight:900;
color:#b30000;
cursor:pointer;
transition:.2s;
}

.point:hover{
background:#cfcfcf;
}

/* ===== IMAGE ===== */

.category-center{
text-align:center;
}

.category-center img{
width:170px;
height:170px;
object-fit:contain;
}

.category-title{
margin-top:18px;
background:#ff7a3d;
color:white;
padding:14px 50px;
border-radius:35px;
font-weight:900;
font-size:22px;
}

/* ===== BOTTOM ===== */

.bottom{
margin-top:60px;
background:#e6e6e6;
padding:60px 140px;
display:flex;
align-items:flex-start;
justify-content:space-between;
}

/* يمين ويسار ثابتين */
.team-right{
display:flex;
flex-direction:column;
align-items:center;
gap:20px;
}

.team-left{
display:flex;
flex-direction:column;
align-items:center;
gap:20px;
}

.team-name{
background:#c40000;
color:white;
padding:18px 130px;
border-radius:70px;
font-weight:900;
font-size:26px;
}

.score-box{
background:#d8d8d8;
border-radius:70px;
display:flex;
align-items:center;
padding:12px 30px;
gap:30px;
}

.score-btn{
background:#c40000;
color:white;
border:none;
width:45px;
height:45px;
border-radius:50%;
font-size:24px;
cursor:pointer;
}

.score-value{
font-size:26px;
font-weight:900;
width:40px;
text-align:center;
}

.helpers-title{
font-size:22px;
font-weight:700;
}

.helpers{
display:flex;
gap:25px;
}

.helper{
width:55px;
height:55px;
background:#d8d8d8;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
cursor:pointer;
font-size:20px;
}

.helper.active{
background:#c40000;
color:white;
}

.center-title{
font-size:70px;
font-weight:900;
color:#444;
}
</style>
</head>
<body>

<div class="topbar">
<div class="turn" id="turnBox"></div>
<div>سين ميم</div>
</div>

<div class="board-wrapper">
<div class="board" id="board"></div>
</div>

<div class="bottom">

<div class="team-right">
<div class="team-name" id="team1Name"></div>

<div class="score-box">
<button class="score-btn" onclick="changeScore(1,-100)">-</button>
<div class="score-value" id="score1">0</div>
<button class="score-btn" onclick="changeScore(1,100)">+</button>
</div>

<div class="helpers-title">وسائل المساعدة</div>
<div class="helpers">
<div class="helper" onclick="activateHelper(this)">🔁</div>
<div class="helper" onclick="activateHelper(this)">📞</div>
<div class="helper" onclick="activateHelper(this)">✌</div>
</div>
</div>

<div class="center-title">سين ميم</div>

<div class="team-left">
<div class="team-name" id="team2Name"></div>

<div class="score-box">
<button class="score-btn" onclick="changeScore(2,-100)">-</button>
<div class="score-value" id="score2">0</div>
<button class="score-btn" onclick="changeScore(2,100)">+</button>
</div>

<div class="helpers-title">وسائل المساعدة</div>
<div class="helpers">
<div class="helper" onclick="activateHelper(this)">🔁</div>
<div class="helper" onclick="activateHelper(this)">📞</div>
<div class="helper" onclick="activateHelper(this)">✌</div>
</div>
</div>

</div>

<script>
const team1 = localStorage.getItem("team1Name") || "الفريق الأول";
const team2 = localStorage.getItem("team2Name") || "الفريق الثاني";
const selected = JSON.parse(localStorage.getItem("selectedCategories")) || [];

let score1 = parseInt(localStorage.getItem("score1")) || 0;
let score2 = parseInt(localStorage.getItem("score2")) || 0;

document.getElementById("team1Name").innerText = team1;
document.getElementById("team2Name").innerText = team2;

updateScores();

let currentTeam = localStorage.getItem("turnTeam") || "1";
document.getElementById("turnBox").innerText =
"دور فريق: " + (currentTeam === "1" ? team1 : team2);

function changeScore(team,value){
if(team===1){ score1 += value; }
else{ score2 += value; }
localStorage.setItem("score1",score1);
localStorage.setItem("score2",score2);
updateScores();
}

function updateScores(){
document.getElementById("score1").innerText = score1;
document.getElementById("score2").innerText = score2;
}

function activateHelper(el){
el.classList.toggle("active");
}

fetch("/api/categories")
.then(res=>res.json())
.then(data=>{
const board=document.getElementById("board");

selected.slice(0,6).forEach(catName=>{
const cat=data.find(c=>c.name===catName);
if(!cat) return;

const div=document.createElement("div");
div.className="category-card";

div.innerHTML=`
<div class="points-col">
<div class="point">200</div>
<div class="point">400</div>
<div class="point">600</div>
</div>

<div class="category-center">
<img src="${cat.image}">
<div class="category-title">${cat.name}</div>
</div>

<div class="points-col">
<div class="point">200</div>
<div class="point">400</div>
<div class="point">600</div>
</div>
`;

board.appendChild(div);
});
});
</script>

</body>
</html>
