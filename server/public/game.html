<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>سين ميم</title>

<style>
body{
margin:0;
font-family:Cairo, Arial;
direction:rtl;
background:#d9d9d9;
}

/* ===== Top Bar ===== */

.topbar{
background:linear-gradient(to right,#ff3b3b,#ff7a3d);
color:white;
padding:15px 25px;
display:flex;
justify-content:space-between;
align-items:center;
font-weight:bold;
}

.turn-box{
background:#b30000;
padding:8px 18px;
border-radius:25px;
}

/* ===== Board ===== */

.board{
padding:30px;
display:grid;
grid-template-columns:repeat(3,1fr);
gap:35px;
}

.category{
display:flex;
align-items:center;
justify-content:space-between;
background:#eee;
border-radius:25px;
padding:15px;
}

.points-col{
display:flex;
flex-direction:column;
gap:10px;
}

.point{
background:#ccc;
padding:10px 25px;
border-radius:20px;
font-size:22px;
font-weight:bold;
color:#b30000;
cursor:pointer;
text-align:center;
min-width:80px;
}

.point:hover{
background:#bbb;
}

.category-center{
text-align:center;
}

.category-center img{
width:120px;
height:120px;
object-fit:contain;
}

.category-title{
background:#ff7a3d;
color:white;
padding:8px;
border-radius:10px;
margin-top:10px;
font-weight:bold;
}

/* ===== Bottom ===== */

.bottom{
background:#eee;
padding:25px;
display:flex;
justify-content:space-between;
align-items:center;
}

.team{
background:#b30000;
color:white;
padding:12px 25px;
border-radius:25px;
display:flex;
align-items:center;
gap:20px;
}

.score-box{
background:white;
color:black;
padding:5px 15px;
border-radius:25px;
display:flex;
align-items:center;
gap:15px;
}

.btn{
width:30px;
height:30px;
border-radius:50%;
border:none;
font-size:18px;
cursor:pointer;
}

.plus{background:#2ecc71;color:white;}
.minus{background:#e74c3c;color:white;}

.modal{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.6);
display:none;
justify-content:center;
align-items:center;
}

.modal-content{
background:white;
padding:30px;
border-radius:20px;
width:80%;
max-width:600px;
text-align:center;
}

.answer{
margin-top:20px;
display:none;
font-weight:bold;
color:#b30000;
}
</style>
</head>

<body>

<div class="topbar">
<div>سين ميم</div>
<div class="turn-box" id="turnBox"></div>
</div>

<div class="board" id="board"></div>

<div class="bottom">

<div class="team">
<span id="team1Label"></span>
<div class="score-box">
<button class="btn minus" onclick="changeScore('t1',-100)">-</button>
<span id="t1">0</span>
<button class="btn plus" onclick="changeScore('t1',100)">+</button>
</div>
</div>

<div class="team">
<span id="team2Label"></span>
<div class="score-box">
<button class="btn minus" onclick="changeScore('t2',-100)">-</button>
<span id="t2">0</span>
<button class="btn plus" onclick="changeScore('t2',100)">+</button>
</div>
</div>

</div>

<div class="modal" id="questionModal">
<div class="modal-content">
<h3 id="questionText"></h3>

<button onclick="showAnswer()">إظهار الإجابة</button>
<div class="answer" id="answerText"></div>

<br><br>
<button onclick="closeModal()">إغلاق</button>
</div>
</div>

<script>

const selectedCategories = JSON.parse(localStorage.getItem("selectedCategories")) || [];
const team1 = localStorage.getItem("team1Name") || "الفريق الأول";
const team2 = localStorage.getItem("team2Name") || "الفريق الثاني";
const email = localStorage.getItem("userEmail");

let currentTeam = 1;
let currentAnswer = "";

document.getElementById("team1Label").innerText = team1;
document.getElementById("team2Label").innerText = team2;

updateTurn();

function updateTurn(){
let name = currentTeam === 1 ? team1 : team2;
document.getElementById("turnBox").innerText = "دور فريق : " + name;
}

function switchTurn(){
currentTeam = currentTeam === 1 ? 2 : 1;
updateTurn();
}

/* ===== Build Board ===== */

const board = document.getElementById("board");

selectedCategories.forEach(category=>{

const div = document.createElement("div");
div.className="category";

div.innerHTML=`
<div class="points-col">
<div class="point" onclick="pick(this,'${category}',200)">200</div>
<div class="point" onclick="pick(this,'${category}',400)">400</div>
<div class="point" onclick="pick(this,'${category}',600)">600</div>
</div>

<div class="category-center">
<img src="https://cdn-icons-png.flaticon.com/512/3135/3135755.png">
<div class="category-title">${category}</div>
</div>

<div class="points-col">
<div class="point" onclick="pick(this,'${category}',200)">200</div>
<div class="point" onclick="pick(this,'${category}',400)">400</div>
<div class="point" onclick="pick(this,'${category}',600)">600</div>
</div>
`;

board.appendChild(div);
});

/* ===== Pick Question ===== */

async function pick(el,category,difficulty){

try{

const res = await fetch("/api/start-game",{
method:"POST",
headers:{ "Content-Type":"application/json" },
body: JSON.stringify({
email,
section:"عام",
category,
difficulty
})
});

const data = await res.json();

if(!res.ok){
alert(data.message || "Game error");
return;
}

currentAnswer = data.answer;

document.getElementById("questionText").innerText = data.question;
document.getElementById("answerText").style.display="none";
document.getElementById("questionModal").style.display="flex";

el.style.visibility="hidden";
switchTurn();

}catch{
alert("Game error");
}

}

function showAnswer(){
document.getElementById("answerText").innerText = currentAnswer;
document.getElementById("answerText").style.display="block";
}

function closeModal(){
document.getElementById("questionModal").style.display="none";
}

function changeScore(id,val){
let score=document.getElementById(id);
score.innerText=parseInt(score.innerText)+val;
}

</script>

</body>
</html>
