<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>سين ميم</title>

<style>
body{
margin:0;
font-family:Cairo, Arial;
direction:rtl;
background:#f2f2f2;
}

.topbar{
background:linear-gradient(to right,#ff3b3b,#b30000);
color:white;
padding:12px 20px;
display:flex;
justify-content:space-between;
align-items:center;
font-weight:bold;
}

.turn-box{
background:#8e0000;
padding:8px 18px;
border-radius:25px;
}

.board{
padding:25px;
display:grid;
grid-template-columns:repeat(3,1fr);
gap:25px;
}

.category{
background:#e6e6e6;
border-radius:20px;
padding:15px;
text-align:center;
}

.category-title{
background:#ff6a3d;
color:white;
padding:10px;
border-radius:12px;
font-weight:bold;
margin-top:10px;
}

.points{
background:#d9d9d9;
margin:8px 0;
padding:12px;
border-radius:20px;
font-size:22px;
font-weight:bold;
cursor:pointer;
color:#a60000;
}

.points:hover{
background:#cfcfcf;
}

.bottom{
display:flex;
justify-content:space-between;
padding:20px 40px;
}

.team{
background:#b30000;
color:white;
padding:15px;
border-radius:20px;
width:30%;
text-align:center;
}

.score{
margin-top:10px;
background:white;
color:black;
padding:8px;
border-radius:20px;
display:flex;
justify-content:center;
align-items:center;
gap:15px;
}

.btn{
width:35px;
height:35px;
border-radius:50%;
border:none;
font-size:18px;
cursor:pointer;
}

.plus{background:#2ecc71;color:white;}
.minus{background:#e74c3c;color:white;}

.modal{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.6);
display:none;
justify-content:center;
align-items:center;
}

.modal-content{
background:white;
padding:30px;
border-radius:20px;
width:80%;
max-width:500px;
text-align:center;
}
</style>
</head>

<body>

<div class="topbar">
<div>سين ميم</div>
<div class="turn-box" id="turnBox"></div>
</div>

<div class="board" id="board"></div>

<div class="bottom">

<div class="team">
<span id="team1Label"></span>
<div class="score">
<button class="btn minus" onclick="changeScore('t1',-100)">-</button>
<span id="t1">0</span>
<button class="btn plus" onclick="changeScore('t1',100)">+</button>
</div>
</div>

<div class="team">
<span id="team2Label"></span>
<div class="score">
<button class="btn minus" onclick="changeScore('t2',-100)">-</button>
<span id="t2">0</span>
<button class="btn plus" onclick="changeScore('t2',100)">+</button>
</div>
</div>

</div>

<div class="modal" id="questionModal">
<div class="modal-content">
<h3 id="questionText"></h3>
<br>
<button onclick="closeModal()">إغلاق</button>
</div>
</div>

<script>

const selectedCategories = JSON.parse(localStorage.getItem("selectedCategories"));
const team1 = localStorage.getItem("team1Name");
const team2 = localStorage.getItem("team2Name");
const email = localStorage.getItem("userEmail");

let currentTeam = 1;

if(!selectedCategories || selectedCategories.length !== 6){
alert("ارجع واختَر الفئات");
window.location.href="setup.html";
}

document.getElementById("team1Label").innerText = team1;
document.getElementById("team2Label").innerText = team2;

updateTurn();

function updateTurn(){
let name = currentTeam === 1 ? team1 : team2;
document.getElementById("turnBox").innerText = "دور الفريق : " + name;
}

function switchTurn(){
currentTeam = currentTeam === 1 ? 2 : 1;
updateTurn();
}

/* ===== Build Board ===== */

const board = document.getElementById("board");

selectedCategories.forEach(category=>{
const div = document.createElement("div");
div.className="category";

div.innerHTML=`
<div class="points" onclick="pick(this,'${category}',200)">200</div>
<div class="points" onclick="pick(this,'${category}',400)">400</div>
<div class="points" onclick="pick(this,'${category}',600)">600</div>
<div class="category-title">${category}</div>
`;

board.appendChild(div);
});

/* ===== Pick Question ===== */

async function pick(el,category,difficulty){

try{

const res = await fetch("/api/start-game",{
method:"POST",
headers:{ "Content-Type":"application/json" },
body: JSON.stringify({
email,
section:"عام",
category,
difficulty
})
});

const data = await res.json();

if(res.ok){

document.getElementById("questionText").innerText = data.question;
document.getElementById("questionModal").style.display="flex";
el.style.visibility="hidden";
switchTurn();

}else{
alert(data.message);
}

}catch{
alert("خطأ اتصال");
}

}

function closeModal(){
document.getElementById("questionModal").style.display="none";
}

function changeScore(id,val){
let score=document.getElementById(id);
score.innerText=parseInt(score.innerText)+val;
}

</script>

</body>
</html>
