<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>سين ميم</title>

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">

<style>

.floating-controls{
position:fixed;
top:20px;
left:20px;
display:flex;
gap:10px;
z-index:9999;
}

.floating-controls button{
width:45px;
height:45px;
border:none;
border-radius:50%;
background:#ff5a2c;
color:white;
font-size:20px;
cursor:pointer;
box-shadow:0 3px 10px rgba(0,0,0,0.3);
}

*{margin:0;padding:0;box-sizing:border-box}

body{
margin:0;
font-family:'Cairo',sans-serif;
background:#cfcfcf;
overflow-x:auto;
}

/* ===== BOARD ===== */

.board-wrapper{
padding:40px 10px;
}

.board{
display:grid;
grid-template-columns:repeat(3, 1fr);
gap:16px;
width:100%;
max-width:1000px;
margin:auto;
}

.category-card{
background:#e7e7e7;
border-radius:35px;
padding:15px;
display:grid;
grid-template-columns:1fr 110px 1fr;
align-items:center;
gap:10px;
}

.points{
display:flex;
flex-direction:column;
gap:16px;
align-items:center;
}

.point{
width:80px;
height:40px;
background:#d8d8d8;
border-radius:50px;
display:flex;
align-items:center;
justify-content:center;
font-weight:900;
font-size:18px;
color:#b30000;
cursor:pointer;
}

.point.used{
opacity:0.3;
pointer-events:none;
}

.category-center{
text-align:center;
}

.category-center img{
width:100px;
height:100px;
object-fit:contain;
}

.category-title{
margin-top:8px;
background:#ff7a3d;
color:white;
padding:8px 20px;
border-radius:20px;
font-weight:900;
}

/* ===== BOTTOM ===== */

.bottom{
margin-top:40px;
background:transparent;
padding:20px 80px;
display:grid;
grid-template-columns:1fr auto 1fr;
align-items:center;
column-gap:120px;
}

.team{
display:flex;
flex-direction:column;
align-items:center;
gap:15px;
}

.team-name{
background:#c40000;
color:white;
padding:14px 110px;
border-radius:60px;
font-size:22px;
font-weight:900;
}

.active-turn{
background:#2e7d32 !important;
transition:0.3s;
}

.team-row{
display:flex;
align-items:center;
gap:35px;
}

/* helpers */

.helpers{
display:flex;
flex-direction:column;
align-items:center;
gap:8px;
}

.helpers-title{
font-size:18px;
font-weight:700;
}

.helpers-icons{
display:flex;
gap:14px;
}

.helper{
width:45px;
height:45px;
border-radius:50%;
background:#d8d8d8;
display:flex;
align-items:center;
justify-content:center;
font-size:20px;
cursor:pointer;
}

/* score */

.score{
background:#d8d8d8;
border-radius:60px;
padding:8px 18px;
display:flex;
align-items:center;
gap:18px;
}

.score button{
background:#c40000;
color:white;
border:none;
width:36px;
height:36px;
border-radius:50%;
font-size:20px;
cursor:pointer;
}

.score-value{
font-weight:900;
font-size:20px;
width:30px;
text-align:center;
}

/* ===== WINNER ===== */

.win-screen{
position:fixed;
top:0;
left:0;
right:0;
bottom:0;
background:#f2f2f2;
display:none;
justify-content:center;
align-items:center;
z-index:99999;
}

.win-box{
width:900px;
max-width:90%;
text-align:center;
}

#winnerName{
font-size:70px;
color:#ff5a2c;
margin:20px 0 40px;
}

.win-teams{
display:flex;
gap:60px;
}

.team-score{
width:260px;
border-radius:25px;
overflow:hidden;
}

.team-score .team-title{
background:#222;
color:white;
padding:15px;
font-size:24px;
}

.team-score .team-points{
padding:30px;
font-size:40px;
font-weight:bold;
}

.team-score.winner .team-points{
background:#86b300;
color:white;
}

.team-score.loser .team-points{
background:#e31818;
color:white;
}

</style>
</head>

<body>

<div class="floating-controls">
<button onclick="exitGame()">🚪</button>
<button onclick="backBoard()">⬜</button>
<button onclick="finishGame()">➡️</button>
</div>

<div class="board-wrapper">
<div class="board" id="board"></div>
</div>

<div class="bottom">

<div class="team">

<div class="team-name" id="team1Name">فريق 1</div>

<div class="team-row">

<div class="score">
<button onclick="changeScore(1,-100)">-</button>
<div class="score-value" id="score1">0</div>
<button onclick="changeScore(1,100)">+</button>
</div>

<div class="helpers">
<div class="helpers-title">وسائل المساعدة</div>

<div class="helpers-icons">
<div class="helper" onclick="useHelper(this,'spy',1)">🕵️</div>
<div class="helper" onclick="useHelper(this,'double',1)">✌</div>
<div class="helper" onclick="useHelper(this,'steal',1)">🕳</div>
</div>

</div>

</div>
</div>

<div class="team">

<div class="team-name" id="team2Name">فريق 2</div>

<div class="team-row">

<div class="helpers">

<div class="helpers-title">وسائل المساعدة</div>

<div class="helpers-icons">
<div class="helper" onclick="useHelper(this,'spy',2)">🕵️</div>
<div class="helper" onclick="useHelper(this,'double',2)">✌</div>
<div class="helper" onclick="useHelper(this,'steal',2)">🕳</div>
</div>

</div>

<div class="score">
<button onclick="changeScore(2,-100)">-</button>
<div class="score-value" id="score2">0</div>
<button onclick="changeScore(2,100)">+</button>
</div>

</div>

</div>

</div>

<div class="win-screen" id="winScreen">

<div class="win-box">

<h2>مبروك الفوز</h2>

<h1 id="winnerName"></h1>

<div class="win-teams">

<div id="team1Box" class="team-score">
<div class="team-title" id="team1Title"></div>
<div class="team-points" id="team1Points"></div>
</div>

<div id="team2Box" class="team-score">
<div class="team-title" id="team2Title"></div>
<div class="team-points" id="team2Points"></div>
</div>

</div>

</div>

</div>

<script>

/* ===== TEAM NAMES ===== */

const t1 = localStorage.getItem("team1Name") || "فريق 1"
const t2 = localStorage.getItem("team2Name") || "فريق 2"

document.getElementById("team1Name").innerText = t1
document.getElementById("team2Name").innerText = t2

let currentTurn = parseInt(localStorage.getItem("currentTeam")) || 1

/* ===== SCORE ===== */

let score1 = parseInt(localStorage.getItem("score1")) || 0
let score2 = parseInt(localStorage.getItem("score2")) || 0

document.getElementById("score1").innerText = score1
document.getElementById("score2").innerText = score2

function changeScore(team,val){

if(team===1){
score1+=val
document.getElementById("score1").innerText=score1
localStorage.setItem("score1",score1)
}

else{
score2+=val
document.getElementById("score2").innerText=score2
localStorage.setItem("score2",score2)
}

}

/* ===== HELPERS ===== */

let helpersUsed={1:{},2:{}}

function useHelper(el,type,team){

if(helpersUsed[team][type]) return

helpersUsed[team][type]=true

el.style.opacity="0.3"
el.style.pointerEvents="none"

}

/* ===== GAME CONTROL ===== */

function exitGame(){
if(confirm("هل انت متأكد تريد الخروج من اللعبة ؟")){
window.location="/"
}
}

function backBoard(){
location.reload()
}

function finishGame(){

let winner=""

if(score1>score2){
winner=t1
document.getElementById("team1Box").classList.add("winner")
document.getElementById("team2Box").classList.add("loser")
}else{
winner=t2
document.getElementById("team2Box").classList.add("winner")
document.getElementById("team1Box").classList.add("loser")
}

document.getElementById("winnerName").innerText=winner

document.getElementById("team1Title").innerText=t1
document.getElementById("team2Title").innerText=t2

document.getElementById("team1Points").innerText=score1
document.getElementById("team2Points").innerText=score2

document.getElementById("winScreen").style.display="flex"

}

/* ===== LOAD CATEGORIES ===== */

fetch("/api/categories")
.then(res=>res.json())
.then(data=>{

const board=document.getElementById("board")

board.innerHTML=""

data.slice(0,6).forEach(cat=>{

const card=document.createElement("div")
card.className="category-card"

card.innerHTML=`

<div class="points">
<div class="point" onclick="chooseQuestion('${cat.name}',200,this)">200</div>
<div class="point" onclick="chooseQuestion('${cat.name}',400,this)">400</div>
<div class="point" onclick="chooseQuestion('${cat.name}',600,this)">600</div>
</div>

<div class="category-center">
<img src="${cat.image}" />
<div class="category-title">${cat.name}</div>
</div>

<div class="points">
<div class="point" onclick="chooseQuestion('${cat.name}',200,this)">200</div>
<div class="point" onclick="chooseQuestion('${cat.name}',400,this)">400</div>
<div class="point" onclick="chooseQuestion('${cat.name}',600,this)">600</div>
</div>

`

board.appendChild(card)

})

})

</script>

</body>
</html>
