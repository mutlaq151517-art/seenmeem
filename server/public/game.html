<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>سين ميم</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:'Cairo',sans-serif;
direction:rtl;
background:#cfcfcf;
}

/* ===== TOP BAR ===== */

.topbar{
width:100%;
background:linear-gradient(to right,#ff3b3b,#ff7a3d);
height:85px;
display:flex;
align-items:center;
justify-content:space-between;
padding:0 60px;
color:white;
font-weight:700;
}

.turn{
background:#c40000;
padding:10px 28px;
border-radius:50px;
font-weight:900;
font-size:16px;
}

/* ===== BOARD ===== */

.board-wrapper{
padding:50px 80px;
}

.board{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:50px;
}

.category-card{
background:#e6e6e6;
border-radius:35px;
padding:25px;
display:flex;
align-items:center;
justify-content:space-between;
}

.points-col{
display:flex;
flex-direction:column;
gap:18px;
}

.point{
background:#d8d8d8;
height:55px;
min-width:150px;
border-radius:50px;
display:flex;
align-items:center;
justify-content:center;
font-size:24px;
font-weight:900;
color:#b30000;
cursor:pointer;
}

/* ===== IMAGE ===== */

.category-center{
text-align:center;
}

.category-center img{
width:140px;
height:140px;
object-fit:contain;
}

.category-title{
margin-top:12px;
background:#ff7a3d;
color:white;
padding:10px 35px;
border-radius:25px;
font-weight:900;
font-size:18px;
}

/* ===== BOTTOM ===== */

.bottom{
margin-top:40px;
background:#e6e6e6;
padding:40px 100px;
display:flex;
justify-content:space-between;
align-items:center;
}

/* الفريق */
.team-side{
display:flex;
flex-direction:column;
gap:15px;
}

.team-name{
background:#c40000;
color:white;
padding:14px 90px;
border-radius:50px;
font-weight:900;
font-size:22px;
text-align:center;
}

/* صف داخلي */
.team-row{
display:flex;
align-items:center;
gap:30px;
}

/* وسائل المساعدة */
.helpers-box{
display:flex;
flex-direction:column;
align-items:center;
gap:10px;
}

.helpers-title{
font-size:18px;
font-weight:700;
}

.helpers{
display:flex;
gap:12px;
}

.helper{
width:45px;
height:45px;
background:#d8d8d8;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
cursor:pointer;
}

.helper.active{
background:#c40000;
color:white;
}

/* النقاط */
.score-box{
background:#d8d8d8;
border-radius:50px;
display:flex;
align-items:center;
padding:8px 20px;
gap:20px;
}

.score-btn{
background:#c40000;
color:white;
border:none;
width:35px;
height:35px;
border-radius:50%;
font-size:20px;
cursor:pointer;
}

.score-value{
font-size:22px;
font-weight:900;
width:30px;
text-align:center;
}

/* اسم اللعبة بالنص */
.center-title{
font-size:50px;
font-weight:900;
color:#444;
}
</style>
</head>
<body>

<div class="topbar">
<div class="turn" id="turnBox"></div>
<div>سين ميم</div>
</div>

<div class="board-wrapper">
<div class="board" id="board"></div>
</div>

<div class="bottom">

<!-- الفريق اليمين -->
<div class="team-side">
<div class="team-name" id="team1Name"></div>
<div class="team-row">
<div class="helpers-box">
<div class="helpers-title">وسائل المساعدة</div>
<div class="helpers">
<div class="helper" onclick="activateHelper(this)">🔁</div>
<div class="helper" onclick="activateHelper(this)">📞</div>
<div class="helper" onclick="activateHelper(this)">✌</div>
</div>
</div>
<div class="score-box">
<button class="score-btn" onclick="changeScore(1,-100)">-</button>
<div class="score-value" id="score1">0</div>
<button class="score-btn" onclick="changeScore(1,100)">+</button>
</div>
</div>
</div>

<div class="center-title">سين ميم</div>

<!-- الفريق اليسار -->
<div class="team-side">
<div class="team-name" id="team2Name"></div>
<div class="team-row">
<div class="score-box">
<button class="score-btn" onclick="changeScore(2,-100)">-</button>
<div class="score-value" id="score2">0</div>
<button class="score-btn" onclick="changeScore(2,100)">+</button>
</div>
<div class="helpers-box">
<div class="helpers-title">وسائل المساعدة</div>
<div class="helpers">
<div class="helper" onclick="activateHelper(this)">🔁</div>
<div class="helper" onclick="activateHelper(this)">📞</div>
<div class="helper" onclick="activateHelper(this)">✌</div>
</div>
</div>
</div>
</div>

</div>

<script>
const team1 = localStorage.getItem("team1Name") || "الفريق الأول";
const team2 = localStorage.getItem("team2Name") || "الفريق الثاني";
const selected = JSON.parse(localStorage.getItem("selectedCategories")) || [];

let score1 = parseInt(localStorage.getItem("score1")) || 0;
let score2 = parseInt(localStorage.getItem("score2")) || 0;

document.getElementById("team1Name").innerText = team1;
document.getElementById("team2Name").innerText = team2;

updateScores();

let currentTeam = localStorage.getItem("turnTeam") || "1";
document.getElementById("turnBox").innerText =
"دور فريق: " + (currentTeam === "1" ? team1 : team2);

function changeScore(team,value){
if(team===1){ score1 += value; }
else{ score2 += value; }
localStorage.setItem("score1",score1);
localStorage.setItem("score2",score2);
updateScores();
}

function updateScores(){
document.getElementById("score1").innerText = score1;
document.getElementById("score2").innerText = score2;
}

function activateHelper(el){
el.classList.toggle("active");
}

fetch("/api/categories")
.then(res=>res.json())
.then(data=>{
const board=document.getElementById("board");

selected.slice(0,6).forEach(catName=>{
const cat=data.find(c=>c.name===catName);
if(!cat) return;

const div=document.createElement("div");
div.className="category-card";

div.innerHTML=`
<div class="points-col">
<div class="point">200</div>
<div class="point">400</div>
<div class="point">600</div>
</div>
<div class="category-center">
<img src="${cat.image}">
<div class="category-title">${cat.name}</div>
</div>
<div class="points-col">
<div class="point">200</div>
<div class="point">400</div>
<div class="point">600</div>
</div>
`;

board.appendChild(div);
});
});
</script>

</body>
</html>
