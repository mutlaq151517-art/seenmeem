<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>سين ميم</title>

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">

<style>

.top-controls-bar{
position:fixed;
top:0;
left:0;
width:100%;
height:70px;
background:#0b2340;
display:flex;
align-items:center;
padding:0 20px;
z-index:9999;
}

.floating-controls{
display:flex;
gap:12px;
}

*{margin:0;padding:0;box-sizing:border-box}

body{
margin:0;
font-family:'Cairo',sans-serif;
background:#cfcfcf;
overflow-x:auto;
}

/* ===== BOARD ===== */

.board-wrapper{
padding:100px 10px 20px;
}

.board{
display:grid;
grid-template-columns:repeat(3, 1fr);
gap:16px;
width:100%;
max-width:1000px;
margin:auto;
}

.category-card{
background:#e7e7e7;
border-radius:35px;
padding:10px;
display:grid;
grid-template-columns:1fr 90px 1fr;
align-items:center;
gap:6px;
}

.points{
display:flex;
flex-direction:column;
gap:16px;
align-items:center;
}

.point{
width:65px;
height:34px;
background:#d8d8d8;
border-radius:50px;
display:flex;
align-items:center;
justify-content:center;
font-weight:900;
font-size:18px;
color:#b30000;
cursor:pointer;
}

.point.used{
opacity:0.3;
pointer-events:none;
}

.category-center{
text-align:center;
}

.category-center img{
width:75px;
height:75px;
object-fit:contain;
}

.category-title{
margin-top:8px;
background:#0b2340;
color:white;
padding:8px 20px;
border-radius:20px;
font-weight:900;
}

/* ===== BOTTOM ===== */

.bottom{
margin-top:10px;
background:transparent;
padding:10px 40px;
display:grid;
grid-template-columns:1fr auto 1fr;
align-items:center;
column-gap:60px;
}

.team{
display:flex;
flex-direction:column;
align-items:center;
gap:15px;
}

.team-name{
background:#0b2340;
color:white;
padding:8px 60px;
border-radius:40px;
font-size:16px;
font-weight:900;
}

.team-row{
display:flex;
align-items:center;
gap:35px;
}

/* helpers */

.helpers{
display:flex;
flex-direction:column;
align-items:center;
gap:8px;
}

.helpers-title{
font-size:18px;
font-weight:700;
color:black;
}

.helpers-icons{
display:flex;
gap:14px;
}

.helper{
width:45px;
height:45px;
border-radius:50%;
background:#d8d8d8;
display:flex;
align-items:center;
justify-content:center;
font-size:20px;
cursor:pointer;
}

/* score */

.score{
background:#d8d8d8;
border-radius:40px;
padding:5px 12px;
display:flex;
align-items:center;
gap:10px;
}

.score button{
background:#0b2340;
color:white;
border:none;
width:28px;
height:28px;
border-radius:50%;
font-size:16px;
cursor:pointer;
}

.score-value{
font-weight:900;
font-size:20px;
width:30px;
text-align:center;
}

/* ===== WINNER ===== */

.win-screen{
position:fixed;
top:0;
left:0;
right:0;
bottom:0;
background:#f2f2f2;
display:none;
justify-content:center;
align-items:center;
z-index:99999;
}

.win-box{
width:900px;
max-width:90%;
text-align:center;
}

#winnerName{
font-size:70px;
color:#ff5a2c;
margin:20px 0 40px;
}

.win-teams{
display:flex;
gap:60px;
}

.team-score{
width:260px;
border-radius:25px;
overflow:hidden;
}

.team-score .team-title{
background:#222;
color:white;
padding:15px;
font-size:24px;
}

.team-score .team-points{
padding:30px;
font-size:40px;
font-weight:bold;
}

.team-score.winner .team-points{
background:#86b300;
color:white;
}

.team-score.loser .team-points{
background:#e31818;
color:white;
}
.dark-mode{
background:#0e1117;
color:white;
}

.dark-mode .category-card{
background:#1c1f26;
}

.dark-mode .point{
background:#2b2f36;
color:#ff6b6b;
}

.dark-mode .score{
background:#2b2f36;
}

.dark-mode .helper{
background:#2b2f36;
}

.dark-mode .category-title{
background:#ff7a3d;
}
</style>
</head>

<body>

<div class="top-controls-bar">
<div class="floating-controls">
<button onclick="exitGame()">🚪</button>
<button onclick="backBoard()">⬜</button>
<button onclick="finishGame()">➡️</button>
<button onclick="toggleDarkMode()">🌙</button>
</div>
</div>

<!-- لوحة الفئات -->
<div class="board-wrapper">
<div class="board" id="board"></div>
</div>



<div class="bottom">

<div class="team">
<div class="team-name" id="team1Name">فريق 1</div>

<div class="team-row">
<div class="score">
<button onclick="changeScore(1,-100)">-</button>
<div class="score-value" id="score1">0</div>
<button onclick="changeScore(1,100)">+</button>
</div>

<div class="helpers">
<div class="helpers-title">وسائل المساعدة</div>

<div class="helpers-icons">
<div class="helper" onclick="useHelper(this,'spy',1)">🕵️</div>
<div class="helper" onclick="useHelper(this,'double',1)">✌</div>
<div class="helper" onclick="useHelper(this,'steal',1)">🕳</div>
</div>
</div>

</div>
</div>

<div class="team">

<div class="team-name" id="team2Name">فريق 2</div>

<div class="team-row">

<div class="helpers">
<div class="helpers-title">وسائل المساعدة</div>

<div class="helpers-icons">
<div class="helper" onclick="useHelper(this,'spy',2)">🕵️</div>
<div class="helper" onclick="useHelper(this,'double',2)">✌</div>
<div class="helper" onclick="useHelper(this,'steal',2)">🕳</div>
</div>
</div>

<div class="score">
<button onclick="changeScore(2,-100)">-</button>
<div class="score-value" id="score2">0</div>
<button onclick="changeScore(2,100)">+</button>
</div>

</div>
</div>

</div>

<script>

/* ===== TEAM NAMES ===== */

const t1 = localStorage.getItem("team1Name") || "فريق 1"
const t2 = localStorage.getItem("team2Name") || "فريق 2"

document.getElementById("team1Name").innerText = t1
document.getElementById("team2Name").innerText = t2

/* ===== SCORE ===== */

let score1 = parseInt(localStorage.getItem("score1")) || 0
let score2 = parseInt(localStorage.getItem("score2")) || 0

document.getElementById("score1").innerText = score1
document.getElementById("score2").innerText = score2

function changeScore(team,val){

if(team===1){
score1+=val
document.getElementById("score1").innerText=score1
localStorage.setItem("score1",score1)
}

else{
score2+=val
document.getElementById("score2").innerText=score2
localStorage.setItem("score2",score2)
}

}

/* ===== HELPERS ===== */

let helpersUsed={1:{},2:{}}

function useHelper(el,type,team){

if(localStorage.getItem(type+"Used"+team)) return;

localStorage.setItem(type+"Used"+team,true);

el.classList.add("used");

}

/* ===== GAME CONTROL ===== */

function exitGame(){
if(confirm("هل انت متأكد تريد الخروج من اللعبة ؟")){
window.location="/"
}
}

function backBoard(){
location.reload()
}

function finishGame(){

let winner=""

if(score1>score2){
winner=t1
}else{
winner=t2
}

alert("الفائز هو: " + winner)

}

/* ===== LOAD CATEGORIES ===== */

fetch("/api/categories")
.then(res=>res.json())
.then(data=>{

const board=document.getElementById("board")

board.innerHTML=""

data.slice(0,6).forEach(cat=>{
let used = JSON.parse(localStorage.getItem("usedQuestions") || "[]");
const card=document.createElement("div")
card.className="category-card"

card.innerHTML=`

<div class="points">
<div class="point" data-key="${cat.name}-200" onclick="chooseQuestion('${cat.name}',200,this)">200</div>

<div class="point" data-key="${cat.name}-400" onclick="chooseQuestion('${cat.name}',400,this)">400</div>

<div class="point" data-key="${cat.name}-600" onclick="chooseQuestion('${cat.name}',600,this)">600</div>
</div>

<div class="category-center">
<img src="${cat.image}" />
<div class="category-title">${cat.name}</div>
</div>

<div class="points">
<div class="point" onclick="chooseQuestion('${cat.name}',200,this)">200</div>
<div class="point" onclick="chooseQuestion('${cat.name}',400,this)">400</div>
<div class="point" onclick="chooseQuestion('${cat.name}',600,this)">600</div>
</div>

`
card.querySelectorAll(".point").forEach(p=>{

let key = p.dataset.key;

if(used.includes(key)){
p.classList.add("used");
p.style.pointerEvents="none";
}

});
board.appendChild(card)

})

})
function toggleDarkMode(){

document.body.classList.toggle("dark-mode")

if(document.body.classList.contains("dark-mode")){
localStorage.setItem("darkMode","on")
}else{
localStorage.removeItem("darkMode")
}

}

if(localStorage.getItem("darkMode")){
document.body.classList.add("dark-mode")
}
function chooseQuestion(category,points,el){

localStorage.setItem("currentCategory",category);
localStorage.setItem("currentPoints",points);

/* حفظ السؤال المستخدم */
let used = JSON.parse(localStorage.getItem("usedQuestions") || "[]");
used.push(el.dataset.key);
localStorage.setItem("usedQuestions",JSON.stringify(used));

window.location.href="question.html";

}
</script>

</body>
</html>
