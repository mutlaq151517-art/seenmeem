<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>سين ميم</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
<style>
body{margin:0;font-family:'Cairo',sans-serif;direction:rtl;background:#d9d9d9;}

.topbar{
background:linear-gradient(to right,#ff3b3b,#ff7a3d);
color:white;
padding:15px 25px;
display:flex;
justify-content:space-between;
align-items:center;
}

.turn{
background:#b30000;
padding:8px 18px;
border-radius:25px;
font-weight:bold;
}

.board{
padding:30px;
display:grid;
grid-template-columns:repeat(3,1fr);
gap:35px;
}

.category{
background:#e5e5e5;
border-radius:30px;
padding:15px;
display:flex;
align-items:center;
justify-content:space-between;
}

.points-col{
display:flex;
flex-direction:column;
gap:15px;
}

.point{
background:#cfcfcf;
padding:12px 25px;
border-radius:25px;
font-size:22px;
font-weight:bold;
color:#b30000;
cursor:pointer;
text-align:center;
min-width:90px;
transition:0.3s;
}

.point.used{
opacity:0.35;
pointer-events:none;
}

.category-center{text-align:center;}
.category-center img{width:130px;height:130px;object-fit:contain;}
.category-title{
background:#ff7a3d;
color:white;
padding:10px;
border-radius:15px;
margin-top:10px;
font-weight:bold;
}

.bottom{
background:#eee;
padding:25px;
display:flex;
justify-content:space-between;
align-items:center;
}

.team{
background:#b30000;
color:white;
padding:12px 25px;
border-radius:25px;
display:flex;
flex-direction:column;
align-items:center;
gap:10px;
font-weight:bold;
}

.score{
background:white;
color:black;
padding:5px 15px;
border-radius:25px;
}

/* وسائل المساعدة */
.helpers{
display:flex;
gap:10px;
margin-top:8px;
}

.helper-btn{
background:white;
color:black;
padding:5px 10px;
border-radius:20px;
cursor:pointer;
font-size:14px;
}

.helper-btn.used{
opacity:0.3;
pointer-events:none;
}
</style>
</head>
<body>

<div class="topbar">
<div>سين ميم</div>
<div class="turn" id="turnBox"></div>
</div>

<div class="board" id="board"></div>

<div class="bottom">

<div class="team">
<span id="team1Name"></span>
<div class="score" id="score1">0</div>

<div class="helpers">
<div class="helper-btn" onclick="doubleAnswer(1)" id="double1">✌ إجابتين</div>
<div class="helper-btn" onclick="stealQuestion(1)" id="steal1">🕵 سرقة</div>
<div class="helper-btn" onclick="holeMode(1)" id="hole1">🕳 حفرة</div>
</div>

</div>

<div class="team">
<span id="team2Name"></span>
<div class="score" id="score2">0</div>

<div class="helpers">
<div class="helper-btn" onclick="doubleAnswer(2)" id="double2">✌ إجابتين</div>
<div class="helper-btn" onclick="stealQuestion(2)" id="steal2">🕵 سرقة</div>
<div class="helper-btn" onclick="holeMode(2)" id="hole2">🕳 حفرة</div>
</div>

</div>

</div>

<button onclick="endGame()" style="
position:fixed;
bottom:20px;
left:20px;
padding:10px 25px;
background:black;
color:white;
border:none;
border-radius:12px;
font-weight:bold;
cursor:pointer;
z-index:999;">
إنهاء اللعبة
</button>

<script>

/* ===== تهيئة ===== */

const email = localStorage.getItem("userEmail");
const categoriesSelected = JSON.parse(localStorage.getItem("selectedCategories")) || [];
const team1 = localStorage.getItem("team1Name") || "الفريق الأول";
const team2 = localStorage.getItem("team2Name") || "الفريق الثاني";

let currentTeam = localStorage.getItem("turnTeam") || "1";

document.getElementById("team1Name").innerText = team1;
document.getElementById("team2Name").innerText = team2;

updateTurn();

function updateTurn(){
document.getElementById("turnBox").innerText =
"دور فريق: " + (currentTeam === "1" ? team1 : team2);
}

/* ===== وسائل المساعدة ===== */

function doubleAnswer(team){
if(currentTeam != team) return alert("مو دورك");
localStorage.setItem("doubleActive","true");
document.getElementById("double"+team).classList.add("used");
}

function stealQuestion(team){
if(currentTeam == team) return alert("ما تقدر تسرق دورك");
localStorage.setItem("stealActive","true");
localStorage.setItem("stealTeam",team);
localStorage.setItem("originalTeam",currentTeam);
document.getElementById("steal"+team).classList.add("used");
}

function holeMode(team){
if(currentTeam != team) return alert("مو دورك");
localStorage.setItem("holeActive","true");
document.getElementById("hole"+team).classList.add("used");
}

/* ===== تحميل الفئات ===== */

fetch("/api/categories")
.then(res=>res.json())
.then(data=>{
const board=document.getElementById("board");

categoriesSelected.forEach(catName=>{
const cat=data.find(c=>c.name===catName);
if(!cat) return;

const div=document.createElement("div");
div.className="category";

div.innerHTML=`
<div class="points-col">
<div class="point" onclick="openQ(this,'${cat.name}',200)">200</div>
<div class="point" onclick="openQ(this,'${cat.name}',400)">400</div>
<div class="point" onclick="openQ(this,'${cat.name}',600)">600</div>
</div>

<div class="category-center">
<img src="${cat.image}">
<div class="category-title">${cat.name}</div>
</div>

<div class="points-col">
<div class="point" onclick="openQ(this,'${cat.name}',200)">200</div>
<div class="point" onclick="openQ(this,'${cat.name}',400)">400</div>
<div class="point" onclick="openQ(this,'${cat.name}',600)">600</div>
</div>
`;

board.appendChild(div);
});
});

/* ===== فتح السؤال ===== */

function openQ(el,category,points){

fetch("/api/start-game",{
method:"POST",
headers:{ "Content-Type":"application/json" },
body:JSON.stringify({ email, category, difficulty:points })
})
.then(res=>res.json())
.then(data=>{

localStorage.setItem("currentQuestion",data.question);
localStorage.setItem("currentAnswer",data.answer);
localStorage.setItem("currentPoints",points);
localStorage.setItem("currentCategory",category);
localStorage.setItem("currentTeam",currentTeam);

window.location.href="question.html";

});
}

/* ===== إنهاء اللعبة ===== */

function endGame(){
window.location.href="home.html";
}

</script>
</body>
</html>
