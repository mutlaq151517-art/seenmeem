<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>سين ميم</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
<style>
body{
margin:0;
font-family:'Cairo',sans-serif;
direction:rtl;
background:#d9d9d9;
}

.topbar{
background:linear-gradient(to right,#ff3b3b,#ff7a3d);
color:white;
padding:15px 25px;
display:flex;
justify-content:space-between;
align-items:center;
}

.turn{
background:#b30000;
padding:8px 18px;
border-radius:25px;
font-weight:bold;
}

.board{
padding:30px;
display:grid;
grid-template-columns:repeat(3,1fr);
gap:35px;
}

.category{
background:#e5e5e5;
border-radius:30px;
padding:15px;
display:flex;
align-items:center;
justify-content:space-between;
}

.points-col{
display:flex;
flex-direction:column;
gap:15px;
}

.point{
background:#cfcfcf;
padding:12px 25px;
border-radius:25px;
font-size:22px;
font-weight:bold;
color:#b30000;
cursor:pointer;
text-align:center;
min-width:90px;
transition:0.3s;
}

.point.used{
opacity:0.35;
pointer-events:none;
}

.category-center{
text-align:center;
}

.category-center img{
width:130px;
height:130px;
object-fit:contain;
}

.category-title{
background:#ff7a3d;
color:white;
padding:10px;
border-radius:15px;
margin-top:10px;
font-weight:bold;
}

.bottom{
background:#eee;
padding:25px;
display:flex;
justify-content:space-between;
align-items:center;
}

.team{
background:#b30000;
color:white;
padding:12px 25px;
border-radius:25px;
display:flex;
align-items:center;
gap:20px;
font-weight:bold;
}

.score{
background:white;
color:black;
padding:5px 15px;
border-radius:25px;
}
</style>
</head>
<body>

<div class="topbar">
<div>سين ميم</div>
<div class="turn" id="turnBox"></div>
</div>

<div class="board" id="board"></div>

<div class="bottom">
<div class="team">
<span id="team1Name"></span>
<div class="score" id="score1">0</div>
</div>

<div class="team">
<span id="team2Name"></span>
<div class="score" id="score2">0</div>
</div>
</div>

<script>

/* ===== تصفير المباراة دائماً ===== */
localStorage.setItem("score1",0);
localStorage.setItem("score2",0);
localStorage.setItem("turnTeam","1");
localStorage.setItem("usedQuestions",JSON.stringify([]));

const email = localStorage.getItem("userEmail");
const categoriesSelected = JSON.parse(localStorage.getItem("selectedCategories"));
const team1 = localStorage.getItem("team1Name");
const team2 = localStorage.getItem("team2Name");

let score1 = 0;
let score2 = 0;
let currentTeam = "1";
let usedQuestions = [];

document.getElementById("team1Name").innerText = team1;
document.getElementById("team2Name").innerText = team2;
document.getElementById("score1").innerText = score1;
document.getElementById("score2").innerText = score2;

updateTurn();

function updateTurn(){
document.getElementById("turnBox").innerText =
"دور فريق: " + (currentTeam === "1" ? team1 : team2);
}

fetch("/api/categories")
.then(res=>res.json())
.then(data=>{

const board=document.getElementById("board");

categoriesSelected.forEach(catName=>{

const cat=data.find(c=>c.name===catName);
if(!cat) return;

const div=document.createElement("div");
div.className="category";

div.innerHTML=`
<div class="points-col">
<div class="point" data-id="${cat.name}-200" onclick="openQ(this,'${cat.name}',200)">200</div>
<div class="point" data-id="${cat.name}-400" onclick="openQ(this,'${cat.name}',400)">400</div>
<div class="point" data-id="${cat.name}-600" onclick="openQ(this,'${cat.name}',600)">600</div>
</div>

<div class="category-center">
<img src="${cat.image}">
<div class="category-title">${cat.name}</div>
</div>

<div class="points-col">
<div class="point" data-id="${cat.name}-200-b" onclick="openQ(this,'${cat.name}',200)">200</div>
<div class="point" data-id="${cat.name}-400-b" onclick="openQ(this,'${cat.name}',400)">400</div>
<div class="point" data-id="${cat.name}-600-b" onclick="openQ(this,'${cat.name}',600)">600</div>
</div>
`;

board.appendChild(div);

});

});

function openQ(el,category,points){

const id = el.getAttribute("data-id");
if(usedQuestions.includes(id)) return;

usedQuestions.push(id);
localStorage.setItem("usedQuestions",JSON.stringify(usedQuestions));
el.classList.add("used");

fetch("/api/start-game",{
method:"POST",
headers:{ "Content-Type":"application/json" },
body:JSON.stringify({ 
  email,
  category, 
  difficulty:points 
})
})
.then(res=>res.json())
.then(data=>{

localStorage.setItem("currentQuestion",data.question);
localStorage.setItem("currentAnswer",data.answer);
localStorage.setItem("currentPoints",points);
localStorage.setItem("currentCategory",category);
localStorage.setItem("currentTeam",currentTeam);

window.location.href="question.html";

});
}

</script>
</body>
</html>
