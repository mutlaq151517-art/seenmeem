<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>سين ميم</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">

<style>
html,body{
margin:0;
padding:0;
font-family:'Cairo',sans-serif;
direction:rtl;
background:#cfcfcf;
}

/* ===== Top Bar ===== */

.topbar{
background:linear-gradient(to right,#ff3b3b,#ff7a3d);
width:100%;
height:80px;
display:flex;
align-items:center;
justify-content:space-between;
padding:0 60px;
box-sizing:border-box;
color:white;
font-weight:700;
}

.turn{
background:#c40000;
padding:10px 25px;
border-radius:30px;
font-weight:900;
}

/* ===== Board ===== */

.board-wrapper{
padding:40px 60px;
}

.board{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:35px;
width:100%;
}

.category-card{
background:#e9e9e9;
border-radius:35px;
padding:20px;
display:flex;
align-items:center;
justify-content:space-between;
}

/* ===== Points ===== */

.points-col{
display:flex;
flex-direction:column;
gap:15px;
}

.point{
background:#d8d8d8;
border-radius:50px;
height:50px;
display:flex;
align-items:center;
justify-content:center;
font-size:24px;
font-weight:900;
color:#b30000;
min-width:130px;
cursor:pointer;
transition:.2s;
}

.point:hover{
background:#cccccc;
}

.point.used{
opacity:0.35;
pointer-events:none;
}

/* ===== Category Center ===== */

.category-center{
text-align:center;
}

.category-center img{
width:130px;
height:130px;
object-fit:contain;
}

.category-title{
margin-top:10px;
background:#ff7a3d;
color:white;
padding:8px 20px;
border-radius:20px;
font-weight:900;
}

/* ===== Bottom ===== */

.bottom{
background:#e9e9e9;
padding:40px 80px;
margin-top:40px;
display:flex;
align-items:center;
justify-content:space-between;
box-sizing:border-box;
}

.team-section{
display:flex;
flex-direction:column;
align-items:center;
gap:12px;
}

.team-name{
background:#c40000;
color:white;
padding:12px 70px;
border-radius:40px;
font-weight:900;
font-size:20px;
}

.score-box{
background:#d8d8d8;
border-radius:50px;
display:flex;
align-items:center;
padding:6px 14px;
gap:15px;
}

.score-btn{
background:#c40000;
color:white;
border:none;
width:32px;
height:32px;
border-radius:50%;
font-size:18px;
cursor:pointer;
}

.score-value{
font-size:20px;
font-weight:900;
width:25px;
text-align:center;
}

.helpers{
display:flex;
gap:10px;
}

.helper{
width:36px;
height:36px;
background:#d8d8d8;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
cursor:pointer;
}

.helper.active{
background:#c40000;
color:white;
}

.center-title{
font-size:44px;
font-weight:900;
color:#444;
}
</style>
</head>
<body>

<div class="topbar">
<div>سين ميم</div>
<div class="turn" id="turnBox"></div>
</div>

<div class="board-wrapper">
<div class="board" id="board"></div>
</div>

<div class="bottom">

<div class="team-section">
<div class="team-name" id="team1Name"></div>

<div class="score-box">
<button class="score-btn" onclick="changeScore(1,-100)">-</button>
<div class="score-value" id="score1">0</div>
<button class="score-btn" onclick="changeScore(1,100)">+</button>
</div>

<div class="helpers">
<div class="helper" onclick="activateHelper(this)">🔁</div>
<div class="helper" onclick="activateHelper(this)">📞</div>
<div class="helper" onclick="activateHelper(this)">✌</div>
</div>
</div>

<div class="center-title">سين ميم</div>

<div class="team-section">
<div class="team-name" id="team2Name"></div>

<div class="score-box">
<button class="score-btn" onclick="changeScore(2,-100)">-</button>
<div class="score-value" id="score2">0</div>
<button class="score-btn" onclick="changeScore(2,100)">+</button>
</div>

<div class="helpers">
<div class="helper" onclick="activateHelper(this)">🔁</div>
<div class="helper" onclick="activateHelper(this)">📞</div>
<div class="helper" onclick="activateHelper(this)">✌</div>
</div>
</div>

</div>

<script>

const team1 = localStorage.getItem("team1Name") || "الفريق الأول";
const team2 = localStorage.getItem("team2Name") || "الفريق الثاني";

let score1 = parseInt(localStorage.getItem("score1")) || 0;
let score2 = parseInt(localStorage.getItem("score2")) || 0;

document.getElementById("team1Name").innerText = team1;
document.getElementById("team2Name").innerText = team2;

updateScores();

let currentTeam = localStorage.getItem("turnTeam") || "1";
document.getElementById("turnBox").innerText =
"دور فريق: " + (currentTeam === "1" ? team1 : team2);

function changeScore(team,value){
if(team===1){ score1 += value; }
else{ score2 += value; }
localStorage.setItem("score1",score1);
localStorage.setItem("score2",score2);
updateScores();
}

function updateScores(){
document.getElementById("score1").innerText = score1;
document.getElementById("score2").innerText = score2;
}

function activateHelper(el){
el.classList.toggle("active");
}

fetch("/api/categories")
.then(res=>res.json())
.then(data=>{
const board=document.getElementById("board");
data.forEach(cat=>{
const div=document.createElement("div");
div.className="category-card";
div.innerHTML=`
<div class="points-col">
<div class="point">200</div>
<div class="point">400</div>
<div class="point">600</div>
</div>
<div class="category-center">
<img src="${cat.image}">
<div class="category-title">${cat.name}</div>
</div>
<div class="points-col">
<div class="point">200</div>
<div class="point">400</div>
<div class="point">600</div>
</div>
`;
board.appendChild(div);
});
});
</script>

</body>
</html>
