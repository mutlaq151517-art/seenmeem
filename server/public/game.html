<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>سين ميم</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:'Cairo',sans-serif;
direction:rtl;
background:#cfcfcf;
}

/* ===== Top Bar ===== */

.topbar{
width:100%;
background:linear-gradient(to right,#ff3b3b,#ff7a3d);
height:90px;
display:flex;
align-items:center;
justify-content:space-between;
padding:0 70px;
color:white;
font-weight:700;
}

.turn{
background:#c40000;
padding:12px 30px;
border-radius:40px;
font-weight:900;
font-size:18px;
}

/* ===== Board Area ===== */

.board-wrapper{
padding:60px 100px 30px 100px;
}

.board{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:55px;
}

/* ===== Category Card ===== */

.category-card{
background:#e6e6e6;
border-radius:40px;
padding:30px 25px;
display:flex;
align-items:center;
justify-content:space-between;
}

/* ===== Points ===== */

.points-col{
display:flex;
flex-direction:column;
gap:20px;
}

.point{
background:#d8d8d8;
height:60px;
min-width:160px;
border-radius:60px;
display:flex;
align-items:center;
justify-content:center;
font-size:28px;
font-weight:900;
color:#b30000;
cursor:pointer;
transition:.2s;
}

.point:hover{
background:#cfcfcf;
}

/* ===== Center Image ===== */

.category-center{
text-align:center;
}

.category-center img{
width:160px;
height:160px;
object-fit:contain;
}

.category-title{
margin-top:15px;
background:#ff7a3d;
color:white;
padding:12px 35px;
border-radius:25px;
font-weight:900;
font-size:20px;
}

/* ===== Bottom Section ===== */

.bottom{
margin-top:40px;
background:#e6e6e6;
padding:50px 120px;
display:flex;
justify-content:space-between;
align-items:center;
}

.team-section{
display:flex;
flex-direction:column;
align-items:center;
gap:18px;
}

.team-name{
background:#c40000;
color:white;
padding:16px 110px;
border-radius:50px;
font-weight:900;
font-size:24px;
}

.score-box{
background:#d8d8d8;
border-radius:60px;
display:flex;
align-items:center;
padding:10px 20px;
gap:25px;
}

.score-btn{
background:#c40000;
color:white;
border:none;
width:40px;
height:40px;
border-radius:50%;
font-size:22px;
cursor:pointer;
}

.score-value{
font-size:24px;
font-weight:900;
width:35px;
text-align:center;
}

.helpers-title{
font-size:20px;
font-weight:700;
}

.helpers{
display:flex;
gap:18px;
}

.helper{
width:50px;
height:50px;
background:#d8d8d8;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
font-size:20px;
cursor:pointer;
}

.helper.active{
background:#c40000;
color:white;
}

.center-title{
font-size:60px;
font-weight:900;
color:#444;
}
</style>
</head>
<body>

<div class="topbar">
<div>سين ميم</div>
<div class="turn" id="turnBox"></div>
</div>

<div class="board-wrapper">
<div class="board" id="board"></div>
</div>

<div class="bottom">

<div class="team-section">
<div class="team-name" id="team1Name"></div>

<div class="score-box">
<button class="score-btn" onclick="changeScore(1,-100)">-</button>
<div class="score-value" id="score1">0</div>
<button class="score-btn" onclick="changeScore(1,100)">+</button>
</div>

<div class="helpers-title">وسائل المساعدة</div>
<div class="helpers">
<div class="helper" onclick="activateHelper(this)">🔁</div>
<div class="helper" onclick="activateHelper(this)">📞</div>
<div class="helper" onclick="activateHelper(this)">✌</div>
</div>
</div>

<div class="center-title">سين ميم</div>

<div class="team-section">
<div class="team-name" id="team2Name"></div>

<div class="score-box">
<button class="score-btn" onclick="changeScore(2,-100)">-</button>
<div class="score-value" id="score2">0</div>
<button class="score-btn" onclick="changeScore(2,100)">+</button>
</div>

<div class="helpers-title">وسائل المساعدة</div>
<div class="helpers">
<div class="helper" onclick="activateHelper(this)">🔁</div>
<div class="helper" onclick="activateHelper(this)">📞</div>
<div class="helper" onclick="activateHelper(this)">✌</div>
</div>
</div>

</div>

<script>

const team1 = localStorage.getItem("team1Name") || "الفريق الأول";
const team2 = localStorage.getItem("team2Name") || "الفريق الثاني";

let score1 = parseInt(localStorage.getItem("score1")) || 0;
let score2 = parseInt(localStorage.getItem("score2")) || 0;

document.getElementById("team1Name").innerText = team1;
document.getElementById("team2Name").innerText = team2;

updateScores();

let currentTeam = localStorage.getItem("turnTeam") || "1";
document.getElementById("turnBox").innerText =
"دور فريق: " + (currentTeam === "1" ? team1 : team2);

function changeScore(team,value){
if(team===1){ score1 += value; }
else{ score2 += value; }
localStorage.setItem("score1",score1);
localStorage.setItem("score2",score2);
updateScores();
}

function updateScores(){
document.getElementById("score1").innerText = score1;
document.getElementById("score2").innerText = score2;
}

function activateHelper(el){
el.classList.toggle("active");
}

fetch("/api/categories")
.then(res=>res.json())
.then(data=>{
const board=document.getElementById("board");

data.forEach(cat=>{
const div=document.createElement("div");
div.className="category-card";

div.innerHTML=`
<div class="points-col">
<div class="point">200</div>
<div class="point">400</div>
<div class="point">600</div>
</div>

<div class="category-center">
<img src="${cat.image}">
<div class="category-title">${cat.name}</div>
</div>

<div class="points-col">
<div class="point">200</div>
<div class="point">400</div>
<div class="point">600</div>
</div>
`;

board.appendChild(div);
});

});
</script>

</body>
</html>
