<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>سين ميم</title>

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">

<style>
body{
margin:0;
font-family:'Cairo',sans-serif;
direction:rtl;
background:linear-gradient(135deg,#ff3b3b,#b30000);
color:white;
}

/* ===== TOP ===== */
.topbar{
display:flex;
justify-content:space-between;
align-items:center;
padding:15px 30px;
font-weight:bold;
font-size:20px;
}

.turn-box{
background:white;
color:#b30000;
padding:8px 20px;
border-radius:30px;
font-weight:bold;
}

/* ===== BOARD ===== */
.board{
padding:30px;
display:grid;
grid-template-columns:repeat(3,1fr);
gap:20px;
}

.category{
background:rgba(255,255,255,0.15);
border-radius:20px;
padding:15px;
text-align:center;
backdrop-filter:blur(10px);
}

.category-title{
margin-top:10px;
font-weight:900;
}

.points{
background:white;
color:#b30000;
margin:8px 0;
padding:12px;
border-radius:15px;
font-size:22px;
font-weight:bold;
cursor:pointer;
transition:0.2s;
}

.points:hover{
transform:scale(1.05);
}

/* ===== TEAMS ===== */
.bottom{
display:flex;
justify-content:space-around;
padding:20px;
}

.team{
background:white;
color:#b30000;
padding:15px;
border-radius:20px;
width:35%;
text-align:center;
}

.score{
margin-top:10px;
display:flex;
justify-content:center;
gap:10px;
align-items:center;
}

.btn{
width:35px;
height:35px;
border-radius:50%;
border:none;
font-size:18px;
cursor:pointer;
}

.plus{background:#2ecc71;color:white;}
.minus{background:#e74c3c;color:white;}

/* ===== MODAL ===== */
.modal{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.8);
display:none;
justify-content:center;
align-items:center;
}

.modal-content{
background:white;
color:#333;
padding:40px;
border-radius:25px;
width:90%;
max-width:600px;
text-align:center;
}

.timer{
font-size:45px;
color:#b30000;
margin:20px 0;
font-weight:bold;
}

.modal button{
margin:10px;
padding:10px 20px;
border:none;
border-radius:10px;
cursor:pointer;
font-weight:bold;
}

.show-btn{background:#b30000;color:white;}
.reset-btn{background:#333;color:white;}
.close-btn{background:#999;color:white;}

.answer{
margin-top:20px;
font-size:20px;
font-weight:bold;
display:none;
}
</style>
</head>

<body>

<div class="topbar">
<div>سين ميم</div>
<div class="turn-box" id="turnBox"></div>
</div>

<div class="board" id="board"></div>

<div class="bottom">

<div class="team">
<span id="team1Label"></span>
<div class="score">
<button class="btn minus" onclick="changeScore('t1',-100)">-</button>
<span id="t1">0</span>
<button class="btn plus" onclick="changeScore('t1',100)">+</button>
</div>
</div>

<div class="team">
<span id="team2Label"></span>
<div class="score">
<button class="btn minus" onclick="changeScore('t2',-100)">-</button>
<span id="t2">0</span>
<button class="btn plus" onclick="changeScore('t2',100)">+</button>
</div>
</div>

</div>

<div class="modal" id="questionModal">
<div class="modal-content">

<h2 id="questionText"></h2>

<div class="timer" id="timer">60</div>

<button class="show-btn" onclick="showAnswer()">إظهار الإجابة</button>
<button class="reset-btn" onclick="resetTimer()">إعادة الوقت</button>
<button class="close-btn" onclick="closeModal()">إغلاق</button>

<div class="answer" id="answerText"></div>

</div>
</div>

<script>

const selectedCategories = JSON.parse(localStorage.getItem("selectedCategories"));
const team1 = localStorage.getItem("team1Name");
const team2 = localStorage.getItem("team2Name");
const email = localStorage.getItem("userEmail");

let currentTeam = 1;
let timerInterval;
let timeLeft = 60;
let currentAnswer = "";

if(!selectedCategories || selectedCategories.length !== 6){
alert("ارجع واختَر الفئات");
window.location.href="setup.html";
}

document.getElementById("team1Label").innerText = team1;
document.getElementById("team2Label").innerText = team2;

updateTurn();

function updateTurn(){
let name = currentTeam === 1 ? team1 : team2;
document.getElementById("turnBox").innerText = "دور الفريق : " + name;
}

function switchTurn(){
currentTeam = currentTeam === 1 ? 2 : 1;
updateTurn();
}

const board = document.getElementById("board");

selectedCategories.forEach(category=>{
const div = document.createElement("div");
div.className="category";

div.innerHTML=`
<div class="points" onclick="pick(this,'${category}',200)">200</div>
<div class="points" onclick="pick(this,'${category}',400)">400</div>
<div class="points" onclick="pick(this,'${category}',600)">600</div>
<div class="category-title">${category}</div>
`;

board.appendChild(div);
});

async function pick(el,category,difficulty){

const res = await fetch("/api/start-game",{
method:"POST",
headers:{ "Content-Type":"application/json" },
body: JSON.stringify({
email,
section:"عام",
category,
difficulty
})
});

const data = await res.json();

if(res.ok){

document.getElementById("questionText").innerText = data.question;
currentAnswer = data.answer;

document.getElementById("answerText").style.display="none";
document.getElementById("questionModal").style.display="flex";

startTimer();

el.style.visibility="hidden";

}else{
alert(data.message);
}
}

function startTimer(){
timeLeft = 60;
document.getElementById("timer").innerText = timeLeft;

clearInterval(timerInterval);

timerInterval = setInterval(()=>{
timeLeft--;
document.getElementById("timer").innerText = timeLeft;

if(timeLeft <= 0){
clearInterval(timerInterval);
}
},1000);
}

function resetTimer(){
startTimer();
}

function showAnswer(){
document.getElementById("answerText").innerText = "الإجابة: " + currentAnswer;
document.getElementById("answerText").style.display="block";
clearInterval(timerInterval);
switchTurn();
}

function closeModal(){
document.getElementById("questionModal").style.display="none";
clearInterval(timerInterval);
}

function changeScore(id,val){
let score=document.getElementById(id);
score.innerText=parseInt(score.innerText)+val;
}

</script>

</body>
</html>
