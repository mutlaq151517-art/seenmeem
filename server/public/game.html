<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>سين ميم</title>

<style>
body{
margin:0;
font-family:Cairo;
direction:rtl;
background:#d9d9d9;
}

/* ===== Top Bar ===== */
.topbar{
background:linear-gradient(to right,#ff3b3b,#ff7a3d);
color:white;
padding:15px 25px;
display:flex;
justify-content:space-between;
align-items:center;
}

.turn{
background:#b30000;
padding:8px 18px;
border-radius:25px;
font-weight:bold;
}

/* ===== Board ===== */
.board{
padding:30px;
display:grid;
grid-template-columns:repeat(3,1fr);
gap:35px;
}

.category{
background:#e5e5e5;
border-radius:30px;
padding:15px;
display:flex;
align-items:center;
justify-content:space-between;
}

.points-col{
display:flex;
flex-direction:column;
gap:15px;
}

.point{
background:#cfcfcf;
padding:12px 25px;
border-radius:25px;
font-size:22px;
font-weight:bold;
color:#b30000;
cursor:pointer;
text-align:center;
min-width:90px;
transition:0.2s;
}

/* بدل الإخفاء نخليه باهت */
.point.used{
opacity:0.35;
pointer-events:none;
background:#bdbdbd;
color:#777;
}

.category-center{
text-align:center;
}

.category-center img{
width:130px;
height:130px;
object-fit:contain;
}

.category-title{
background:#ff7a3d;
color:white;
padding:10px;
border-radius:15px;
margin-top:10px;
font-weight:bold;
}

/* ===== Bottom Scores ===== */
.bottom{
background:#eee;
padding:25px;
display:flex;
justify-content:space-between;
align-items:center;
}

.team{
background:#b30000;
color:white;
padding:12px 25px;
border-radius:25px;
display:flex;
align-items:center;
gap:20px;
font-weight:bold;
}

.score{
background:white;
color:black;
padding:5px 15px;
border-radius:25px;
}
</style>
</head>
<body>

<div class="topbar">
<div>سين ميم</div>
<div class="turn" id="turnBox"></div>
</div>

<div class="board" id="board"></div>

<div class="bottom">
<div class="team">
<span id="team1Name"></span>
<div class="score" id="score1">0</div>
</div>

<div class="team">
<span id="team2Name"></span>
<div class="score" id="score2">0</div>
</div>
</div>

<script>

/* ================= CLEAN START ================= */

if(!localStorage.getItem("gameStarted")){
localStorage.setItem("score1",0);
localStorage.setItem("score2",0);
localStorage.setItem("turnTeam",localStorage.getItem("team1Name"));
localStorage.setItem("usedQuestions",JSON.stringify([]));
localStorage.setItem("gameStarted","yes");
}

/* ================= VARIABLES ================= */

const categoriesSelected = JSON.parse(localStorage.getItem("selectedCategories")) || [];
const team1 = localStorage.getItem("team1Name") || "فريق 1";
const team2 = localStorage.getItem("team2Name") || "فريق 2";

let score1 = parseInt(localStorage.getItem("score1")) || 0;
let score2 = parseInt(localStorage.getItem("score2")) || 0;
let currentTeam = localStorage.getItem("turnTeam") || team1;
let usedQuestions = JSON.parse(localStorage.getItem("usedQuestions")) || [];

document.getElementById("team1Name").innerText = team1;
document.getElementById("team2Name").innerText = team2;
document.getElementById("score1").innerText = score1;
document.getElementById("score2").innerText = score2;

updateTurn();

function updateTurn(){
document.getElementById("turnBox").innerText = "دور فريق: " + currentTeam;
}

function switchTurn(){
currentTeam = currentTeam === team1 ? team2 : team1;
localStorage.setItem("turnTeam", currentTeam);
updateTurn();
}

/* ================= LOAD BOARD ================= */

fetch("/api/categories")
.then(res=>res.json())
.then(data=>{

const board=document.getElementById("board");
board.innerHTML="";

categoriesSelected.forEach(catName=>{

const cat=data.find(c=>c.name===catName);
if(!cat) return;

const div=document.createElement("div");
div.className="category";

div.innerHTML=`
<div class="points-col">
${createPoint(cat.name,200)}
${createPoint(cat.name,400)}
${createPoint(cat.name,600)}
</div>

<div class="category-center">
<img src="${cat.image || ''}">
<div class="category-title">${cat.name}</div>
</div>

<div class="points-col">
${createPoint(cat.name,200)}
${createPoint(cat.name,400)}
${createPoint(cat.name,600)}
</div>
`;

board.appendChild(div);

});

});

/* ================= CREATE POINT BUTTON ================= */

function createPoint(category,points){

const key = category+"_"+points;
const used = usedQuestions.includes(key) ? "used" : "";

return `<div class="point ${used}" 
onclick="openQ(this,'${category}',${points})">${points}</div>`;
}

/* ================= OPEN QUESTION ================= */

function openQ(el,category,points){

const key = category+"_"+points;

if(usedQuestions.includes(key)) return;

usedQuestions.push(key);
localStorage.setItem("usedQuestions",JSON.stringify(usedQuestions));

el.classList.add("used");

fetch("/api/start-game",{
method:"POST",
headers:{ "Content-Type":"application/json" },
body:JSON.stringify({
section:"عام",
category,
difficulty:points
})
})
.then(res=>res.json())
.then(data=>{

if(!data || !data.question){
alert("مشكلة في توليد السؤال");
return;
}

localStorage.setItem("currentQuestion", data.question || "خطأ");
localStorage.setItem("currentAnswer", data.answer || "");
localStorage.setItem("currentImage", data.image || "");
localStorage.setItem("currentPoints", points);

window.location.href = "question.html";

});
}

/* ================= RETURN FROM WINNER ================= */

if(localStorage.getItem("addPoints")){
const winner = localStorage.getItem("addPoints");
const pts = parseInt(localStorage.getItem("currentPoints")) || 0;

if(winner === "team1"){ score1 += pts; }
if(winner === "team2"){ score2 += pts; }

localStorage.setItem("score1", score1);
localStorage.setItem("score2", score2);

document.getElementById("score1").innerText = score1;
document.getElementById("score2").innerText = score2;

localStorage.removeItem("addPoints");
switchTurn();
}

</script>
</body>
</html>
