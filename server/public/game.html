<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>سين ميم</title>

<style>
body{
margin:0;
font-family:Cairo, Arial;
direction:rtl;
background:#d9d9d9;
}

/* ===== Overlay ===== */

.overlay{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.55);
display:none;
justify-content:center;
align-items:center;
z-index:999;
}

.card{
background:#f7f7f7;
width:85%;
max-width:1100px;
height:80%;
border:6px solid #e53935;
border-radius:35px;
position:relative;
padding:40px;
display:flex;
flex-direction:column;
justify-content:space-between;
}

/* ===== Timer ===== */

.timer{
position:absolute;
top:-28px;
left:50%;
transform:translateX(-50%);
background:#2c2c2c;
color:white;
padding:12px 30px;
border-radius:30px;
font-size:22px;
font-weight:bold;
}

/* ===== Points Badge ===== */

.points{
position:absolute;
top:20px;
right:20px;
background:black;
color:white;
padding:10px 18px;
border-radius:15px;
font-weight:bold;
}

/* ===== Question ===== */

.question{
font-size:30px;
font-weight:bold;
text-align:center;
margin-top:40px;
}

/* ===== Answer Screen ===== */

.answer-screen{
display:none;
flex-direction:column;
align-items:center;
justify-content:center;
height:100%;
font-size:36px;
font-weight:bold;
}

/* ===== Buttons ===== */

.buttons{
display:flex;
justify-content:space-between;
}

.btn-green{
background:#2e7d32;
color:white;
border:none;
padding:12px 25px;
border-radius:25px;
cursor:pointer;
font-size:18px;
}

.btn-red{
background:#d32f2f;
color:white;
border:none;
padding:12px 25px;
border-radius:25px;
cursor:pointer;
font-size:18px;
}

</style>
</head>
<body>

<div class="overlay" id="overlay">
<div class="card">

<div class="timer" id="timer">60</div>
<div class="points" id="points"></div>

<div class="question" id="questionText"></div>

<div class="answer-screen" id="answerScreen">
<div id="answerText"></div>
</div>

<div class="buttons">
<button class="btn-green" onclick="showAnswer()">الإجابة</button>
<button class="btn-red" onclick="closeCard()">رجوع</button>
</div>

</div>
</div>

<script>

let timeLeft = 60;
let interval;

/* ===== Fake Demo Pick (اربطها مع API عندك) ===== */

function openQuestion(text, answer, points){

document.getElementById("overlay").style.display="flex";
document.getElementById("questionText").innerText = text;
document.getElementById("answerText").innerText = answer;
document.getElementById("points").innerText = points + " نقطة";

document.getElementById("questionText").style.display="block";
document.getElementById("answerScreen").style.display="none";

startTimer();
}

function startTimer(){
timeLeft = 60;
document.getElementById("timer").innerText = timeLeft;

interval = setInterval(()=>{
timeLeft--;
document.getElementById("timer").innerText = timeLeft;

if(timeLeft <= 0){
clearInterval(interval);
}
},1000);
}

function showAnswer(){
clearInterval(interval);

document.getElementById("questionText").style.display="none";
document.getElementById("answerScreen").style.display="flex";
}

function closeCard(){
clearInterval(interval);
document.getElementById("overlay").style.display="none";
}

</script>

</body>
</html>
