<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>سين ميم</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
<style>

body{
margin:0;
font-family:'Cairo',sans-serif;
direction:rtl;
background:#d9d9d9;
}

/* ===== Top Bar ===== */

.topbar{
background:linear-gradient(to right,#ff3b3b,#ff7a3d);
color:white;
padding:15px 25px;
display:flex;
justify-content:space-between;
align-items:center;
}

.turn{
background:#b30000;
padding:8px 18px;
border-radius:25px;
font-weight:bold;
}

/* ===== Board ===== */

.board{
padding:30px;
display:grid;
grid-template-columns:repeat(3,1fr);
gap:35px;
}

.category{
background:#e5e5e5;
border-radius:30px;
padding:15px;
display:flex;
align-items:center;
justify-content:space-between;
}

.points-col{
display:flex;
flex-direction:column;
gap:15px;
}

.point{
background:#cfcfcf;
padding:12px 25px;
border-radius:25px;
font-size:22px;
font-weight:bold;
color:#b30000;
cursor:pointer;
text-align:center;
min-width:90px;
transition:0.3s;
}

.point.used{
opacity:0.35;
pointer-events:none;
}

/* ===== Category Center ===== */

.category-center{
text-align:center;
}

.category-center img{
width:130px;
height:130px;
object-fit:contain;
}

.category-title{
background:#ff7a3d;
color:white;
padding:10px;
border-radius:15px;
margin-top:10px;
font-weight:bold;
}

/* ===== Bottom Scores ===== */

.bottom{
background:#eee;
padding:25px;
display:flex;
justify-content:space-between;
align-items:center;
}

.team{
background:#b30000;
color:white;
padding:12px 25px;
border-radius:25px;
display:flex;
align-items:center;
gap:20px;
font-weight:bold;
}

.score{
background:white;
color:black;
padding:5px 15px;
border-radius:25px;
}

/* ===== Overlay ===== */

.overlay{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.6);
display:none;
justify-content:center;
align-items:center;
}

.card{
background:white;
padding:40px;
border-radius:30px;
width:80%;
max-width:900px;
text-align:center;
}

.btn{
padding:10px 25px;
border:none;
border-radius:20px;
color:white;
cursor:pointer;
margin:10px;
font-size:18px;
}

.green{background:#2e7d32;}
.red{background:#d32f2f;}
.gray{background:#888;}

</style>
</head>
<body>

<div class="topbar">
<div>سين ميم</div>
<div class="turn" id="turnBox"></div>
</div>

<div class="board" id="board"></div>

<div class="bottom">
<div class="team">
<span id="team1Name"></span>
<div class="score" id="score1">0</div>
</div>

<div class="team">
<span id="team2Name"></span>
<div class="score" id="score2">0</div>
</div>
</div>

<div class="overlay" id="overlay">
<div class="card">
<h2 id="questionText"></h2>
<div id="answerText" style="display:none;font-size:28px;margin-top:20px;"></div>

<div id="answerBtns">
<button class="btn green" onclick="showAnswer()">إظهار الإجابة</button>
<button class="btn red" onclick="closeCard()">إغلاق</button>
</div>

<div id="teamChoice" style="display:none;">
<h3>أي فريق جاوب صح؟</h3>
<button class="btn red" onclick="givePoints(1)" id="btn1"></button>
<button class="btn red" onclick="givePoints(2)" id="btn2"></button>
<button class="btn gray" onclick="closeCard()">ولا أحد</button>
</div>
</div>
</div>

<script>

/* ===== Reset match state on first load ===== */

if(!localStorage.getItem("matchStarted")){
localStorage.setItem("score1",0);
localStorage.setItem("score2",0);
localStorage.setItem("turnTeam","1");
localStorage.setItem("usedQuestions",JSON.stringify([]));
localStorage.setItem("matchStarted","true");
}

/* ===== Variables ===== */

const categoriesSelected = JSON.parse(localStorage.getItem("selectedCategories"));
const team1 = localStorage.getItem("team1Name");
const team2 = localStorage.getItem("team2Name");

let score1 = parseInt(localStorage.getItem("score1"));
let score2 = parseInt(localStorage.getItem("score2"));
let currentTeam = localStorage.getItem("turnTeam");
let usedQuestions = JSON.parse(localStorage.getItem("usedQuestions"));

document.getElementById("team1Name").innerText = team1;
document.getElementById("team2Name").innerText = team2;
document.getElementById("score1").innerText = score1;
document.getElementById("score2").innerText = score2;

updateTurn();

function updateTurn(){
document.getElementById("turnBox").innerText =
"دور فريق: " + (currentTeam === "1" ? team1 : team2);
}

function switchTurn(){
currentTeam = currentTeam === "1" ? "2" : "1";
localStorage.setItem("turnTeam", currentTeam);
updateTurn();
}

/* ===== Load Categories ===== */

fetch("/api/categories")
.then(res=>res.json())
.then(data=>{

const board=document.getElementById("board");

categoriesSelected.forEach(catName=>{

const cat=data.find(c=>c.name===catName);
if(!cat) return;

const div=document.createElement("div");
div.className="category";

div.innerHTML=`
<div class="points-col">
<div class="point" data-id="${cat.name}-200" onclick="openQ(this,'${cat.name}',200)">200</div>
<div class="point" data-id="${cat.name}-400" onclick="openQ(this,'${cat.name}',400)">400</div>
<div class="point" data-id="${cat.name}-600" onclick="openQ(this,'${cat.name}',600)">600</div>
</div>

<div class="category-center">
<img src="${cat.image}">
<div class="category-title">${cat.name}</div>
</div>

<div class="points-col">
<div class="point" data-id="${cat.name}-200-b" onclick="openQ(this,'${cat.name}',200)">200</div>
<div class="point" data-id="${cat.name}-400-b" onclick="openQ(this,'${cat.name}',400)">400</div>
<div class="point" data-id="${cat.name}-600-b" onclick="openQ(this,'${cat.name}',600)">600</div>
</div>
`;

board.appendChild(div);

});

/* ===== Restore Used ===== */

usedQuestions.forEach(id=>{
const el=document.querySelector(`[data-id="${id}"]`);
if(el) el.classList.add("used");
});

});

/* ===== Open Question ===== */

function openQ(el,category,points){

const id = el.getAttribute("data-id");

if(usedQuestions.includes(id)) return;

usedQuestions.push(id);
localStorage.setItem("usedQuestions",JSON.stringify(usedQuestions));

el.classList.add("used");

fetch("/api/start-game",{
method:"POST",
headers:{ "Content-Type":"application/json" },
body:JSON.stringify({ category, difficulty:points })
})
.then(res=>res.json())
.then(data=>{

document.getElementById("overlay").style.display="flex";
document.getElementById("questionText").innerText=data.question;
document.getElementById("answerText").innerText=data.answer;
document.getElementById("answerText").style.display="none";
document.getElementById("answerBtns").style.display="block";
document.getElementById("teamChoice").style.display="none";
document.getElementById("btn1").innerText=team1;
document.getElementById("btn2").innerText=team2;

localStorage.setItem("currentPoints",points);

});
}

function showAnswer(){
document.getElementById("answerText").style.display="block";
document.getElementById("answerBtns").style.display="none";
document.getElementById("teamChoice").style.display="block";
}

function givePoints(team){

const pts=parseInt(localStorage.getItem("currentPoints"));

if(team===1){
score1+=pts;
localStorage.setItem("score1",score1);
}
if(team===2){
score2+=pts;
localStorage.setItem("score2",score2);
}

document.getElementById("score1").innerText=score1;
document.getElementById("score2").innerText=score2;

closeCard();
}

function closeCard(){
document.getElementById("overlay").style.display="none";
switchTurn();
}

</script>
</body>
</html>
